window.__addEntrada = async function(wId){
  var d = state.draftEntry[wId] || {cidade:'', cats:[], dataExata:'', datasExatas:{}};
  if(!d.cidade){ showToast('Selecione a cidade.'); return; }
  if(!d.cats.length){ showToast('Selecione ao menos uma categoria.'); return; }
  var catsCDE = d.cats.filter(function(c){return c==='C'||c==='D'||c==='E';});
  var datasExatas = d.datasExatas || {};
  var semData = catsCDE.filter(function(c){return !datasExatas[c];});
  if(semData.length){ showToast('Informe a data exata para: '+semData.map(function(c){return catLabel(c);}).join(', ')); return; }
  var w = state.semanas.filter(function(x){return x.id===wId;})[0];
  w.entradas = w.entradas || [];
  w.entradas.push({
    id:'E'+Date.now().toString(36).toUpperCase(),
    cidade:d.cidade, categorias:d.cats.slice(),
    datasExatas: Object.assign({}, datasExatas),
    dataExata: catsCDE.length ? (datasExatas[catsCDE[0]]||'') : '',
    status:'Planejado', motivo:'', detalhes:'',
    atualizadoPor:'', atualizadoEm:''
  });
  await storageSet('semanas-lista', JSON.stringify(state.semanas), true);
  state.draftEntry[wId] = {cidade:'', cats:[], dataExata:'', datasExatas:{}};
  showToast('Cidade agendada.');
  renderAgendaTab();
};

window.__excluirEntrada = async function(wId, eId){
  var w = state.semanas.filter(function(x){return x.id===wId;})[0];
  w.entradas = w.entradas.filter(function(e){return e.id!==eId;});
  await storageSet('semanas-lista', JSON.stringify(state.semanas), true);
  renderAgendaTab();
};

function marcarEntrada(wId, eId, fn){
  var w = state.semanas.filter(function(x){return x.id===wId;})[0];
  var e = w.entradas.filter(function(x){return x.id===eId;})[0];
  fn(e);
  e.atualizadoPor = state.perfil.nome+' ('+state.perfil.papel+')';
  e.atualizadoEm = nowStr();
  return storageSet('semanas-lista', JSON.stringify(state.semanas), true);
}
window.__entradaStatus = async function(wId, eId, val){
  await marcarEntrada(wId, eId, function(e){ e.status=val; if(val!=='Interrompido'){ e.motivo=''; e.detalhes=''; } });
  showToast('Status do exame atualizado.');
  renderAgendaTab();
};
window.__entradaMotivo = async function(wId, eId, val){
  await marcarEntrada(wId, eId, function(e){ e.motivo=val; });
  showToast('Motivo registrado.');
};
window.__entradaDetalhes = async function(wId, eId, val){
  await marcarEntrada(wId, eId, function(e){ e.detalhes=val; });
  showToast('Detalhes salvos.');
};

/* ===================================================================
   VEÍCULOS
=================================================================== */
function renderVeiculosTab(){
  var html = '<div class="card" style="margin-bottom:16px;">'+
    '<div class="section-title">🚐 Cadastrar veículo</div>'+
    '<div class="add-vehicle-form">'+
      '<label>Cidade<select id="v-cidade"><option value="">Selecione</option>'+ TODAS_CIDADES.map(function(c){return '<option value="'+esc(c)+'">'+esc(c)+'</option>';}).join('') +'</select></label>'+
      '<label>Categoria atendida<select id="v-cat">'+ CAT_KEYS.map(function(k){return '<option value="'+k+'">'+esc(catLabel(k))+'</option>';}).join('') +'</select></label>'+
      '<label>Identificação<input id="v-nome" type="text" placeholder="Placa / nº da unidade"></label>'+
      '<button class="btn btn-primary" onclick="window.__addVeiculo()">+ Adicionar</button>'+
    '</div>'+
  '</div>';

  /* monta listagem por cidade — inclui veículos em trânsito para o destino */
  var porCidade = {};
  TODAS_CIDADES.forEach(function(c){ porCidade[c] = {proprios:[], emTransito:[]}; });
  state.veiculos.forEach(function(v){
    if(porCidade[v.cidade]) porCidade[v.cidade].proprios.push(v);
    if(v.cidadeDestino && v.status==='Indisponível' && v.motivo==='Em deslocamento para outra cidade'){
      if(porCidade[v.cidadeDestino]) porCidade[v.cidadeDestino].emTransito.push(v);
    }
  });

  function renderVRow(v, isTransito){
    var verde = v.status==='Disponível';
    var row = '<div class="vrow" style="'+(isTransito?'border-color:var(--amber);background:#FFFBF0;':'')+'">';
    if(isTransito){
      row += '<div class="dotbtn" style="background:var(--amber);cursor:default;"><span class="dot"></span>Em trânsito</div>';
    } else {
      row += '<button class="dotbtn '+(verde?'on':'off')+'" onclick="window.__toggleVeiculo(\''+v.id+'\')"><span class="dot"></span>'+(verde?'Disponível':'Indisponível')+'</button>';
    }
    row += '<div class="vinfo">'+
      '<div class="vname">'+esc(v.nome||'Veículo')+' — '+esc(catLabel(v.categoria))+'</div>'+
      '<div class="vsub">'+(isTransito ? '🚛 Vem de '+esc(v.cidade)+' · chegará em breve' : (verde?'Pronto para uso':'Motivo: '+esc(v.motivo||'não informado')))+(v.atualizadoPor?' · '+esc(v.atualizadoPor):'')+'</div>'+
      (!isTransito ? '<div style="display:flex;align-items:center;gap:8px;margin-top:5px;flex-wrap:wrap;">'+
        manutBadge(v)+
        '<label style="font-size:11px;color:var(--ink-soft);display:flex;align-items:center;gap:4px;">Próx. revisão:<input type="date" value="'+esc(v.proximaRevisaoISO||'')+'" style="border:1px solid var(--line);border-radius:6px;padding:3px 6px;font-size:11.5px;" onchange="window.__setManutencao(\''+v.id+'\',this.value)"></label>'+
      '</div>' : '')+
    '</div>';
    if(!verde && !isTransito){
      row += '<div style="display:flex;flex-direction:column;gap:6px;">'+
        '<select class="small-select" onchange="window.__motivoVeiculo(\''+v.id+'\',this.value)">'+
          '<option value="">Motivo…</option>'+ MOTIVOS_INDISPONIVEL.map(function(m){return '<option value="'+m+'"'+(m===v.motivo?' selected':'')+'>'+esc(m)+'</option>';}).join('') +
        '</select>'+
        (v.motivo==='Em deslocamento para outra cidade' ?
          '<div style="display:flex;flex-direction:column;gap:6px;">'+
            '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'+
              '<span style="font-size:12px;color:var(--ink-soft);font-weight:600;">Cidade destino:</span>'+
              '<select class="small-select" onchange="window.__setDestino(\''+v.id+'\',this.value)">'+
                '<option value="">Selecione…</option>'+
                TODAS_CIDADES.filter(function(cc){return cc!==v.cidade;}).map(function(cc){
                  return '<option value="'+esc(cc)+'"'+(cc===v.cidadeDestino?' selected':'')+'>'+esc(cc)+'</option>';
                }).join('')+
              '</select>'+
              (v.cidadeDestino ? '<span style="font-size:11.5px;color:var(--amber-dk);font-weight:600;">→ '+esc(v.cidadeDestino)+'</span>' : '')+
            '</div>'+
            '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">'+
              '<span style="font-size:12px;color:var(--ink-soft);font-weight:600;">Motivo real:</span>'+
              '<select class="small-select" onchange="window.__setMotivoDeslocamento(\''+v.id+'\',this.value)">'+
                '<option value="">Selecione o motivo real…</option>'+
                MOTIVOS_DESLOCAMENTO.map(function(mr){ return '<option value="'+esc(mr)+'"'+(mr===v.motivoDeslocamento?' selected':'')+'>'+esc(mr)+'</option>'; }).join('')+
              '</select>'+
              (v.motivoDeslocamento ? '<span style="font-size:11.5px;color:var(--red);font-weight:600;">⚠ '+esc(v.motivoDeslocamento)+'</span>' : '')+
            '</div>'+
          '</div>' : '')+
      '</div>';
    }
    var exp = state.veiculoExpandido;
    var isExpanded = exp && exp.id===v.id;
    row += '<div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">';
    row += '<button class="btn btn-ghost" style="font-size:11.5px;padding:4px 9px;" onclick="window.__expandVeiculo(\''+v.id+'\',\'historico\')">'+
      (isExpanded && exp.aba==='historico' ? '▲ Histórico' : '▼ Histórico')+'</button>';
    var todosItens = CHECKLIST_ITEMS.concat(v.checklistCustom||[]);
    var okCk = Object.values(v.checklist||{}).filter(Boolean).length;
    row += '<button class="btn btn-ghost" style="font-size:11.5px;padding:4px 9px;color:'+(okCk===todosItens.length?'var(--green)':'var(--amber-dk)')+'" onclick="window.__expandVeiculo(\''+v.id+'\',\'checklist\')">'+
      '✅ '+okCk+'/'+todosItens.length+'</button>';
    if(isTransito){
      row += '<button class="btn btn-primary" style="font-size:11.5px;padding:5px 10px;" onclick="window.__marcarChegou(\''+v.id+'\',\''+v.cidadeDestino+'\')" >✅ Chegou</button>';
    } else {
      row += '<button class="icon-btn" onclick="window.__excluirVeiculo(\''+v.id+'\')" >remover</button>';
    }
    row += '</div>';
    row += '</div>';
    row += renderVeiculoDetail(v);
    return row;
  }

  POLOS.forEach(function(p){
    html += '<div class="section-title" style="margin-top:6px;">'+esc(p.nome)+' — '+esc(p.regiao)+'</div>';
    p.cidades.forEach(function(c){
      var proprios   = porCidade[c].proprios.slice().sort(function(a,b){
        var catOrder = {A:0,B:1,C:2,D:3,E:4};
        var ca = catOrder[a.categoria]??9, cb = catOrder[b.categoria]??9;
        if(ca !== cb) return ca - cb;
        var na = parseFloat((a.nome||'').replace(/[^0-9.]/g,'')) || 0;
        var nb = parseFloat((b.nome||'').replace(/[^0-9.]/g,'')) || 0;
        if(na !== nb) return na - nb;
        return (a.nome||'').localeCompare(b.nome||'');
      });
      var emTransito = porCidade[c].emTransito;
      var total      = proprios.length + emTransito.length;
      var disponiveis= proprios.filter(function(v){return v.status==='Disponível';}).length;
      html += '<div class="vehicle-card">'+
        '<div class="vehicle-head">'+
          '<span>'+esc(c)+'</span>'+
          '<span class="mono" style="font-weight:500;font-size:11.5px;">'+disponiveis+'/'+total+' disponível(eis)'+(emTransito.length?' · '+emTransito.length+' em trânsito':'')+' </span>'+
        '</div><div class="vehicle-body">';
      if(!proprios.length && !emTransito.length){
        html += '<div style="font-size:12.5px;color:var(--ink-soft);">Nenhum veículo cadastrado ou em trânsito para esta cidade.</div>';
      } else {
        proprios.forEach(function(v){ html += renderVRow(v, false); });
        emTransito.forEach(function(v){ html += renderVRow(v, true); });
      }
      html += '</div></div>';
    });
  });

  document.getElementById('tabContent').innerHTML = html;
}

window.__addVeiculo = async function(){
  var cidade = document.getElementById('v-cidade').value;
  var categoria = document.getElementById('v-cat').value;
  var nome = document.getElementById('v-nome').value.trim();
  if(!cidade){ showToast('Selecione a cidade.'); return; }
  state.veiculos.push({id:'V'+Date.now().toString(36).toUpperCase(), cidade:cidade, categoria:categoria, nome:nome, status:'Disponível', motivo:'', atualizadoPor:state.perfil.nome+' ('+state.perfil.papel+')', atualizadoEm:nowStr()});
  await storageSet('veiculos-lista', JSON.stringify(state.veiculos), true);
  showToast('Veículo adicionado.');
  renderVeiculosTab();
};

/* helper — adiciona entrada ao histórico do veículo */
function addHistorico(v, tipo, descricao, extra){
  if(!v.historico) v.historico = [];
  var entry = Object.assign({
    id: 'H'+Date.now().toString(36).toUpperCase(),
    tipo: tipo, descricao: descricao,
    por: state.perfil ? state.perfil.nome+' ('+state.perfil.papel+')' : '—',
    dataISO: new Date().toISOString().slice(0,10),
    em: nowStr(), observacoes: ''
  }, extra||{});
  v.historico.unshift(entry);
}
function histDotColor(tipo){
  if(tipo==='deslocamento') return 'var(--amber)';
  if(tipo==='status') return 'var(--teal)';
  if(tipo==='revisao') return 'var(--green)';
  if(tipo==='checklist') return '#6366F1';
  return 'var(--gray)';
}

window.__toggleVeiculo = async function(id){
  var v = state.veiculos.filter(function(x){return x.id===id;})[0];
  v.status = v.status==='Disponível' ? 'Indisponível' : 'Disponível';
  if(v.status==='Disponível'){ v.motivo=''; v.cidadeDestino=''; }
  v.atualizadoPor = state.perfil.nome+' ('+state.perfil.papel+')';
  v.atualizadoEm = nowStr();
  addHistorico(v, 'status', 'Status alterado para '+v.status, {cidade:v.cidade});
  await storageSet('veiculos-lista', JSON.stringify(state.veiculos), true);
  renderVeiculosTab();
};
window.__motivoVeiculo = async function(id, val){
  var v = state.veiculos.filter(function(x){return x.id===id;})[0];
  v.motivo = val;
  v.atualizadoPor = state.perfil.nome+' ('+state.perfil.papel+')';
  v.atualizadoEm = nowStr();
  if(val) addHistorico(v, 'status', 'Motivo: '+val, {cidade:v.cidade});
  await storageSet('veiculos-lista', JSON.stringify(state.veiculos), true);
  showToast('Motivo registrado.');
  renderVeiculosTab();
};
window.__excluirVeiculo = async function(id){
  if(!confirm('Remover este veículo?')) return;
  state.veiculos = state.veiculos.filter(function(x){return x.id!==id;});
  await storageSet('veiculos-lista', JSON.stringify(state.veiculos), true);
  renderVeiculosTab();
};
window.__setDestino = async function(id, cidade){
  var v = state.veiculos.filter(function(x){return x.id===id;})[0];
  if(!v) return;
  var antes = v.cidadeDestino;
  v.cidadeDestino = cidade;
  v.atualizadoPor = state.perfil.nome+' ('+state.perfil.papel+')';
  v.atualizadoEm = nowStr();
  if(cidade && cidade!==antes) addHistorico(v, 'deslocamento', 'Deslocamento definido → '+cidade+(v.motivoDeslocamento?' ('+v.motivoDeslocamento+')':''), {cidadeOrigem:v.cidade, cidadeDestino:cidade});
  await storageSet('veiculos-lista', JSON.stringify(state.veiculos), true);
  showToast('Destino: '+esc(cidade)+'.');
  renderVeiculosTab();
};

window.__setMotivoDeslocamento = async function(id, motivo){
  var v = state.veiculos.filter(function(x){return x.id===id;})[0];
  if(!v) return;
  v.motivoDeslocamento = motivo;
  v.atualizadoPor = state.perfil.nome+' ('+state.perfil.papel+')';
  v.atualizadoEm = nowStr();
  if(motivo) addHistorico(v, 'deslocamento', 'Motivo real do deslocamento: '+motivo+(v.cidadeDestino?' → '+v.cidadeDestino:''), {cidade:v.cidade, cidadeDestino:v.cidadeDestino||''});
  await storageSet('veiculos-lista', JSON.stringify(state.veiculos), true);
  showToast('Motivo registrado: '+esc(motivo));
  renderVeiculosTab();
};
window.__marcarChegou = async function(id, cidadeDestino){
  var v = state.veiculos.filter(function(x){return x.id===id;})[0];
  if(!v || !cidadeDestino) return;
  var cidadeOrigem = v.cidade;
  addHistorico(v, 'deslocamento', 'Chegou em '+cidadeDestino+' (vindo de '+cidadeOrigem+')', {cidadeOrigem:cidadeOrigem, cidadeDestino:cidadeDestino});
  v.cidade = cidadeDestino; v.cidadeDestino=''; v.motivo=''; v.status='Disponível';
  v.atualizadoPor = state.perfil.nome+' ('+state.perfil.papel+')';
  v.atualizadoEm = nowStr();
  await storageSet('veiculos-lista', JSON.stringify(state.veiculos), true);
  showToast('✅ Disponível em '+esc(cidadeDestino)+'.');
  renderVeiculosTab();
};
window.__setManutencao = async function(id, dataISO){
  var v = state.veiculos.filter(function(x){return x.id===id;})[0];
  if(!v) return;
  v.proximaRevisaoISO = dataISO;
  v.atualizadoPor = state.perfil.nome+' ('+state.perfil.papel+')';
  v.atualizadoEm = nowStr();
  addHistorico(v, 'revisao', 'Próxima revisão → '+dataParaDisplay(dataISO), {cidade:v.cidade});
  await storageSet('veiculos-lista', JSON.stringify(state.veiculos), true);
  showToast('Data de revisão salva.');
  renderVeiculosTab();
};

/* --- histórico e checklist --- */
window.__expandVeiculo = function(id, aba){
  if(state.veiculoExpandido && state.veiculoExpandido.id===id && state.veiculoExpandido.aba===aba){
    state.veiculoExpandido = null;
  } else {
    state.veiculoExpandido = {id:id, aba:aba||'historico'};
  }
  renderVeiculosTab();
};
window.__addVeiculoObs = async function(id){
  var obs = document.getElementById('obs-'+id);
  if(!obs || !obs.value.trim()) return;
  var v = state.veiculos.filter(function(x){return x.id===id;})[0];
  if(!v) return;
  addHistorico(v, 'obs', 'Observação: '+obs.value.trim(), {observacoes:obs.value.trim(), cidade:v.cidade});
  await storageSet('veiculos-lista', JSON.stringify(state.veiculos), true);
  showToast('Observação salva.');
  renderVeiculosTab();
};
window.__toggleChecklist = async function(id, item, checked){
  var v = state.veiculos.filter(function(x){return x.id===id;})[0];
  if(!v) return;
  if(!v.checklist) v.checklist = {};
  v.checklist[item] = checked;
  v.checklistPor = state.perfil.nome+' ('+state.perfil.papel+')';
  v.checklistEm = nowStr();
  var ok = Object.values(v.checklist).filter(Boolean).length;
  var total = Object.keys(v.checklist).length;
  addHistorico(v, 'checklist', 'Checklist — '+item+': '+(checked?'✓ OK':'✗ Pendente')+' ('+ok+'/'+total+')', {cidade:v.cidade});
  await storageSet('veiculos-lista', JSON.stringify(state.veiculos), true);
  renderVeiculosTab();
};
window.__addChecklistItem = async function(id){
  var input = document.getElementById('ck-new-'+id);
  if(!input || !input.value.trim()) return;
  var v = state.veiculos.filter(function(x){return x.id===id;})[0];
  if(!v) return;
  if(!v.checklistCustom) v.checklistCustom = [];
  var item = input.value.trim();
  if(v.checklistCustom.indexOf(item)===-1 && CHECKLIST_ITEMS.indexOf(item)===-1){
    v.checklistCustom.push(item);
    await storageSet('veiculos-lista', JSON.stringify(state.veiculos), true);
    showToast('Item adicionado.');
  }
  renderVeiculosTab();
};

function renderVeiculoDetail(v){
  var exp = state.veiculoExpandido;
  if(!exp || exp.id!==v.id) return '';
  var aba = exp.aba;
  var todosItens = CHECKLIST_ITEMS.concat(v.checklistCustom||[]);
  var ck = v.checklist || {};
  var okCount = todosItens.filter(function(i){return ck[i];}).length;
  var hist = v.historico || [];

  var html = '<div class="hist-wrap">';
  html += '<div class="hist-tabs">'+
    '<button class="hist-tab '+(aba==='historico'?'active':'')+'" onclick="window.__expandVeiculo(\''+v.id+'\',\'historico\')">📋 Histórico</button>'+
    '<button class="hist-tab '+(aba==='checklist'?'active':'')+'" onclick="window.__expandVeiculo(\''+v.id+'\',\'checklist\')">✅ Equipamentos ('+okCount+'/'+todosItens.length+')</button>'+
  '</div>';

  if(aba==='historico'){
    html += '<div style="display:flex;gap:8px;margin-bottom:12px;">'+
      '<input id="obs-'+v.id+'" type="text" placeholder="Registrar observação manual…" style="flex:1;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;">'+
      '<button class="btn btn-primary" onclick="window.__addVeiculoObs(\''+v.id+'\')" >+ Registrar</button>'+
    '</div>';
    if(!hist.length){
      html += '<div style="font-size:12.5px;color:var(--ink-soft);">Sem movimentações registradas. Mudanças de status, deslocamentos e revisões são registradas automaticamente.</div>';
    } else {
      html += '<div class="hist-timeline">';
      hist.forEach(function(h){
        var cor = histDotColor(h.tipo);
        html += '<div class="hist-entry">'+
          '<div class="hist-dot"><div class="hist-dot-circle" style="background:'+cor+';"></div><div class="hist-dot-line"></div></div>'+
          '<div class="hist-content">'+
            '<div class="htitle">'+esc(h.descricao)+'</div>'+
            '<div class="hmeta">'+esc(h.por)+' · '+esc(h.em)+'</div>'+
            (h.cidadeOrigem && h.cidadeDestino ? '<div style="font-size:11px;margin-top:2px;color:var(--amber-dk);">'+esc(h.cidadeOrigem)+' → '+esc(h.cidadeDestino)+'</div>' : '')+
            (h.observacoes ? '<div class="hobs">'+esc(h.observacoes)+'</div>' : '')+
          '</div>'+
        '</div>';
      });
      html += '</div>';
    }
  } else {
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'+
      '<div style="font-size:12.5px;font-weight:700;color:'+(okCount===todosItens.length?'var(--green)':'var(--ink-soft)')+';">'+okCount+'/'+todosItens.length+' itens OK</div>'+
      (v.checklistPor ? '<div style="font-size:11px;color:var(--ink-soft);">'+esc(v.checklistPor)+' · '+esc(v.checklistEm)+'</div>' : '')+
    '</div>';
    html += '<div class="ck-grid">';
    todosItens.forEach(function(item){
      var ok = !!ck[item];
      html += '<label class="ck-item '+(ok?'ok':'nok')+'">'+
        '<input type="checkbox" '+(ok?'checked':'')+' onchange="window.__toggleChecklist(\''+v.id+'\',\''+esc(item)+'\',this.checked)">'+
        '<span>'+esc(item)+'</span>'+
      '</label>';
    });
    html += '</div>'+
      '<div style="display:flex;gap:8px;margin-top:8px;">'+
        '<input id="ck-new-'+v.id+'" type="text" placeholder="Novo item personalizado…" style="flex:1;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:13px;">'+
        '<button class="btn btn-ghost" onclick="window.__addChecklistItem(\''+v.id+'\')">+ Adicionar</button>'+
      '</div>';
  }
  html += '</div>';
  return html;
}


/* ===================================================================
   CHECK-IN DIÁRIO
=================================================================== */
function renderCheckinTab(){
  var hoje = new Date().toISOString().slice(0,10);
  var hojeDisplay = dataParaDisplay(hoje);
  var checkinsHoje = state.checkins.filter(function(c){ return c.dataISO===hoje; });
  var poloUser = state.sessao ? state.checkins.filter(function(c){ return c.responsavelId===state.sessao.id && c.dataISO===hoje; })[0] : null;

  var html = '<div class="card" style="margin-bottom:16px;">';
  if(poloUser){
    html += '<div class="section-title">✅ Seu check-in de hoje já foi registrado</div>'+
      '<div style="font-size:12.5px;color:var(--ink-soft);">'+esc(poloUser.responsavel)+' · '+esc(POLOS.filter(function(p){return p.id===poloUser.polo;})[0].nome)+' · '+esc(hojeDisplay)+'</div>'+

window.__addCheckin = async function(){
  var polo   = document.getElementById('ci-polo').value;
  var queRoda= (document.getElementById('ci-roda').value||'').trim();
  var risco  = (document.getElementById('ci-risco').value||'').trim();
  var bloq   = (document.getElementById('ci-bloq').value||'').trim();
  var dec    = (document.getElementById('ci-dec').value||'').trim();
  var aus    = parseInt(document.getElementById('ci-aus').value,10)||0;
  if(!queRoda){ showToast('Informe o que vai rodar hoje.'); return; }
  var hoje = new Date().toISOString().slice(0,10);
  var ci = {
    id:'CI'+Date.now().toString(36).toUpperCase(),
    polo:polo, dataISO:hoje, responsavel:state.sessao.nome, cargo:state.sessao.cargo,
    responsavelId:state.sessao.id, queRoda:queRoda, riscoDia:risco,
    bloqueios:bloq, decisoes:dec, ausencias:aus, criadoEm:nowStr()
  };
  state.checkins.unshift(ci);
  await storageSet('checkins-lista', JSON.stringify(state.checkins), true);
  showToast('Check-in registrado!');
  renderCheckinTab();
};

window.__excluirCheckin = async function(id){
  if(!confirm('Excluir este check-in?')) return;
  state.checkins = state.checkins.filter(function(c){return c.id!==id;});
  await storageSet('checkins-lista', JSON.stringify(state.checkins), true);
  renderCheckinTab();
};

/* ===================================================================
   MANUTENÇÃO PREVENTIVA — helpers para aba Veículos
=================================================================== */
function diasAteManutencao(v){
  if(!v.proximaRevisaoISO) return null;
  var diff = new Date(v.proximaRevisaoISO) - new Date(new Date().toISOString().slice(0,10));
  return Math.round(diff/(1000*60*60*24));
}
function manutBadge(v){
  if(!v.proximaRevisaoISO) return '<span class="manut-badge" style="background:var(--gray-soft);color:var(--ink-soft);">Sem data</span>';
  var dias = diasAteManutencao(v);
  if(dias < 0)  return '<span class="manut-badge manut-venc">🔴 Vencida há '+Math.abs(dias)+'d</span>';
  if(dias <= 7) return '<span class="manut-badge manut-prox">⚠️ Vence em '+dias+'d</span>';
  return '<span class="manut-badge manut-ok">✅ Em dia ('+dias+'d)</span>';
}

   RELATÓRIO TRIMESTRAL + META REAL CALCULADA
=================================================================== */
/* funções mensais para relatório */
function mesRelAtual(){ var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }

/* --- Cálculo de capacidade por cidade --- */
function examesPorTurno(){ return Math.floor(MINUTOS_TURNO / MINUTOS_PROVA); } /* 20 */

function calcularCapacidade(cidade){
  var cfg = state.metaConfig[cidade] || {};
  var exams = cfg.examinadores || 0;
  var dias  = cfg.diasMes || 0;
  var turno = TURNO_ESPECIAL[cidade] || 'simples';
  var ept   = examesPorTurno(); /* 20 */

  var veicA = state.veiculos.filter(function(v){ return v.cidade===cidade && v.categoria==='A' && v.status==='Disponível'; }).length;
  var veicB = state.veiculos.filter(function(v){ return v.cidade===cidade && v.categoria==='B' && v.status==='Disponível'; }).length;

  var capDiaria = 0;
  var descTurno = '';
  if(turno==='duplo_ambos'){
    /* Recife: A+B nos dois turnos */
    capDiaria = Math.min(veicA + veicB, exams) * ept * 2;
    descTurno = 'Duplo (A+B manhã e tarde)';
  } else if(turno==='dividido'){
    /* Petrolina: B manhã, A tarde */
    capDiaria = Math.min(veicB, exams) * ept + Math.min(veicA, exams) * ept;
    descTurno = 'Dividido (B manhã / A tarde)';
  } else {
    /* Turno único */
    capDiaria = Math.min(veicA + veicB, exams) * ept;
    descTurno = 'Turno único';
  }

  return {
    veicA:veicA, veicB:veicB, examinadores:exams, diasMes:dias,
    turno:turno, descTurno:descTurno,
    capDiaria:capDiaria,
    metaMensal: capDiaria * dias
  };
}

        '<td style="padding:7px 10px;">'+esc(e.descricao)+(e.motivoDeslocamento?'<br><span style="font-size:11px;color:var(--red);">⚠ '+esc(e.motivoDeslocamento)+'</span>':'')+'</td>'+
        '<td style="padding:7px 10px;font-family:\'IBM Plex Mono\',monospace;font-size:12px;">'+esc(e.dataDisplay)+'</td>'+
        '<td style="padding:7px 10px;font-size:11.5px;">'+esc(e.por)+'</td>'+
        '<td style="padding:7px 10px;font-size:11.5px;font-style:italic;color:var(--ink-soft);">'+esc(e.observacoes||'—')+'</td>'+
      '</tr>';
    });
    html += '</tbody></table></div>';
    html += '<div style="font-size:11px;color:var(--ink-soft);margin-top:6px;">* Dados extraídos do histórico de movimentações da aba Veículos.</div>';
  }
  html += '</div></div>';

  /* ============================================================
     BLOCO 3 — RESUMO EXECUTIVO
  ============================================================ */
  html += '<div class="rel-bloco"><div class="rel-head">📈 Resumo executivo — '+nomeMes(mes)+'</div><div class="rel-body">'+
    '<div class="rel-linha"><span>Total exames agendados</span><span class="rel-val">'+totalAgend+'</span></div>'+
    '<div class="rel-linha"><span>Total exames realizados</span><span class="rel-val">'+totalReal+'</span></div>'+
    '<div class="rel-linha"><span>Taxa de realização</span><span class="rel-val" style="color:'+(taxaGeral>=90?'var(--green)':taxaGeral>=70?'var(--amber-dk)':'var(--red)')+'">'+taxaGeral+'%</span></div>'+
    '<div class="rel-linha"><span>Interrupções registradas</span><span class="rel-val" style="color:'+(interrup===0?'var(--green)':'var(--red)')+'">'+interrup+'</span></div>'+
    '<div class="rel-linha"><span>Chamados em aberto</span><span class="rel-val">'+abertosCham+'/'+totalCham+'</span></div>'+
    '<div class="rel-linha"><span>Veículos indisponíveis</span><span class="rel-val" style="color:'+(veicIndisp===0?'var(--green)':'var(--red)')+'">'+veicIndisp+'/'+state.veiculos.length+'</span></div>'+
    '<div class="rel-linha"><span>Ausências (check-ins)</span><span class="rel-val">'+ausencias+'</span></div>'+
  '</div></div>';

  /* BLOCO 3 — por polo */
  html += '<div class="rel-bloco"><div class="rel-head">🗺️ Desempenho por polo</div><div class="rel-body">';
  porPolo.forEach(function(p){
    var taxa = p.agendados>0 ? Math.round(p.realizados/p.agendados*100) : 0;
    html += '<div class="rel-linha"><span>'+esc(p.nome)+'</span>'+
      '<span style="display:flex;gap:12px;align-items:center;">'+
        '<span style="font-size:12px;color:var(--ink-soft);">'+p.agendados+' agend. / '+p.realizados+' realiz.</span>'+
        '<span class="rel-val" style="color:'+(taxa>=90?'var(--green)':taxa>=70?'var(--amber-dk)':'var(--red)')+'">'+taxa+'%</span>'+
        '<span style="font-size:12px;color:var(--ink-soft);">'+p.chamados+' chamados</span>'+
      '</span></div>';
  });
  html += '</div></div>';

  /* BLOCO 4 — princípios */
  html += '<div class="rel-bloco"><div class="rel-head">📌 Princípios operacionais</div><div class="rel-body">'+
    [
      {p:'Problema sem responsável vira caos.', ok:abertosCham < totalCham/2},
      {p:'Indicadores mostram a verdade da operação.', ok:totalReal>0},
      {p:'Veículos disponíveis sustentam a operação.', ok:veicIndisp < state.veiculos.length*0.05},
      {p:'Preventivas em dia evitam paradas.', ok:state.veiculos.filter(function(v){return v.proximaRevisaoISO && diasAteManutencao(v)<0;}).length===0},
      {p:'Check-ins diários geram visibilidade.', ok:checkinT.length >= 20}
    ].map(function(x){
      return '<div class="rel-linha"><span style="font-style:italic;">'+esc(x.p)+'</span>'+
        '<span class="pill '+(x.ok?'green':'red')+'">'+(x.ok?'✓ ok':'⚠ atenção')+'</span></div>';
    }).join('')+
  '</div></div>';

  document.getElementById('tabContent').innerHTML = html;
  /* nav buttons via addEventListener — evita problemas de escaping em onclick */
  var inputMes = document.getElementById('input-rel-mes');
  if(inputMes) inputMes.addEventListener('change', function(){ if(this.value){ state.relMes = this.value; renderRelatorioTab(); } });
}

window.__mcfg = async function(el){
  window.__setMetaConfig(el.dataset.cidade, el.dataset.campo, el.value);
};

window.__gerarEmailManutencao = function(){
  var mes = state.relMes || mesRelAtual();
  var MOTIVOS_MANUT = ['Manutenção / quebra','Revisão programada','Acidente','Sinistro'];
  var entradas = [];
  state.veiculos.forEach(function(v){
    (v.historico||[]).forEach(function(h){
      if(h.dataISO && h.dataISO.startsWith(mes)){
        var isManut = MOTIVOS_MANUT.some(function(m){ return h.descricao && h.descricao.toLowerCase().indexOf(m.toLowerCase())>-1; });
        if(isManut) entradas.push({veiculo:v.nome||'Veículo', categoria:v.categoria, cidade:h.cidade||v.cidade, polo:CIDADE_POLO[v.cidade]?CIDADE_POLO[v.cidade].nome:'—', descricao:h.descricao, dataDisplay:dataParaDisplay(h.dataISO), por:h.por||'—', obs:h.observacoes||'', motivoReal:v.motivoDeslocamento||''});
      }
    });
    if(MOTIVOS_MANUT.indexOf(v.motivo)>-1 && !(v.historico||[]).some(function(h){return h.dataISO&&h.dataISO.startsWith(mes)&&MOTIVOS_MANUT.some(function(m){return h.descricao&&h.descricao.indexOf(m)>-1;});})){
      entradas.push({veiculo:v.nome||'Veículo', categoria:v.categoria, cidade:v.cidade, polo:CIDADE_POLO[v.cidade]?CIDADE_POLO[v.cidade].nome:'—', descricao:'Motivo: '+v.motivo, dataDisplay:'Em aberto', por:v.atualizadoPor||'—', obs:'', motivoReal:v.motivoDeslocamento||''});
    }
  });

  var assunto = encodeURIComponent('Relatório de Manutenção e Quebra — '+nomeMes(mes)+' — Exames PE');
  var corpo = 'Relatório de Veículos em Manutenção / Quebra\n';
  corpo += 'Período: '+nomeMes(mes)+'\n';
  corpo += 'Gerado em: '+nowStr()+'\n';
  corpo += '='.repeat(60)+'\n\n';

  if(!entradas.length){
    corpo += 'Nenhuma manutenção ou quebra registrada neste mês.\n';
  } else {
    entradas.forEach(function(e, i){
      corpo += (i+1)+'. Veículo: '+e.veiculo+' — Categoria '+e.categoria+'\n';
      corpo += '   Cidade: '+e.cidade+' ('+e.polo+')\n';
      corpo += '   Ocorrência: '+e.descricao+'\n';
      if(e.motivoReal) corpo += '   Motivo real: '+e.motivoReal+'\n';
      corpo += '   Data: '+e.dataDisplay+'\n';
      corpo += '   Registrado por: '+e.por+'\n';
      if(e.obs) corpo += '   Observações: '+e.obs+'\n';
      corpo += '\n';
    });
    corpo += '='.repeat(60)+'\n';
    corpo += 'Total de ocorrências: '+entradas.length+'\n';
  }

  corpo += '\nEnviado via Painel de Controle Operacional — Exames PE';
  window.open('mailto:?subject='+assunto+'&body='+encodeURIComponent(corpo));
  showToast('Abrindo cliente de e-mail…');
};

window.__setMetaConfig = async function(cidade, campo, val){
  if(!state.metaConfig[cidade]) state.metaConfig[cidade] = {};
  state.metaConfig[cidade][campo] = parseInt(val,10) || 0;
  await storageSet('meta-config', JSON.stringify(state.metaConfig), true);
  showToast('Meta de '+esc(cidade)+' atualizada.');
};

window.__relMesAnterior = function(){ state.relMes = mesAnterior(state.relMes || mesRelAtual()); renderRelatorioTab(); };
window.__relMesProximo  = function(){ state.relMes = mesProximo(state.relMes  || mesRelAtual()); renderRelatorioTab(); };

window.__exportarRelatorio = function(){
  var mes = state.relMes || mesRelAtual(); /* report month */
  var rows = [['Cidade','Polo','Turno','Veíc A','Veíc B','Examinadores','Dias/mês','Cap. diária','Meta mensal','Realizado mês','% Meta']];
  TODAS_CIDADES.forEach(function(cidade){
    var cap = calcularCapacidade(cidade);
    var real = realizadoMesAtual(cidade, mes);
    var pct = cap.metaMensal>0 ? Math.round(real/cap.metaMensal*100) : 0;
    rows.push([cidade, CIDADE_POLO[cidade].nome, cap.descTurno, cap.veicA, cap.veicB,
      cap.examinadores, cap.diasMes, cap.capDiaria, cap.metaMensal, real, pct+'%']);
  });
  downloadCSV(rows, 'meta_real_'+mes+'.csv');
};


/* ---------------- csv export ---------------- */
function downloadCSV(rows, filename){
  var csv = rows.map(function(r){
    return r.map(function(v){
      var s = (v===undefined||v===null)?'':String(v);
      if(s.indexOf(',')>-1 || s.indexOf('"')>-1 || s.indexOf('\n')>-1) s = '"'+s.replace(/"/g,'""')+'"';
      return s;
    }).join(',');
  }).join('\n');
  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

init();
})();
