<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap">
<style>
  :root{
    --bg:#F2F5F2; --panel:#FFFFFF; --ink:#16241F; --ink-soft:#52645B;
    --teal:#0F3D3E; --teal-dk:#082426; --teal-soft:#DCEAE7;
    --amber:#E8A33D; --amber-dk:#B97A1F; --amber-soft:#FBE7C5;
    --green:#4C9A6B; --green-soft:#DCEFE2;
    --red:#C44536; --red-soft:#F6DAD5;
    --gray:#8B958F; --gray-soft:#E9EDEA;
    --line:#DDE5E1; --radius:14px; --shadow:0 2px 14px rgba(15,61,62,.10);
  }
  *{box-sizing:border-box;}
  #app{font-family:'Inter',sans-serif;color:var(--ink);background:var(--bg);border-radius:18px;overflow:hidden;position:relative;min-height:600px;}
  .dsp{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:IBM Plex Mono,monospace;}
  button{cursor:pointer;font-family:inherit;}
  input,select,textarea{font-family:inherit;font-size:14px;}
  ::selection{background:var(--amber-soft);}

  /* loading */
  #loading{position:absolute;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;z-index:50;}
  .spin{width:34px;height:34px;border-radius:50%;border:3px solid var(--teal-soft);border-top-color:var(--teal);animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* header */
  .hdr{background:linear-gradient(135deg,var(--teal-dk),var(--teal));color:#fff;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:4px solid var(--amber);}
  .hdr h1{margin:0;font-size:19px;letter-spacing:.3px;}
  .hdr .sub{font-size:12px;color:#BFD8D3;margin-top:2px;}
  .profile{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);border-radius:30px;padding:6px 8px 6px 14px;}
  .profile .who{font-size:12.5px;line-height:1.2;text-align:right;}
  .profile .who b{display:block;font-size:13px;}
  .avatar{width:30px;height:30px;border-radius:50%;background:var(--amber);color:var(--teal-dk);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;font-family:'Space Grotesk',sans-serif;}
  .lnk-btn{background:none;border:none;color:#fff;text-decoration:underline;font-size:11.5px;opacity:.85;}

  /* nav */
  .nav{display:flex;gap:4px;background:var(--teal-dk);padding:0 16px;overflow-x:auto;}
  .nav button{background:none;border:none;color:#AFCBC5;padding:13px 16px;font-size:13.5px;font-weight:600;border-bottom:3px solid transparent;white-space:nowrap;}
  .nav button.active{color:#fff;border-bottom-color:var(--amber);}
  .nav button:hover{color:#fff;}

  #tabContent{padding:20px;}

  /* generic */
  .card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;}
  .grid{display:grid;gap:14px;}
  .kpis{grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:16px;}
  .kpi .num{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;}
  .kpi .lbl{font-size:12px;color:var(--ink-soft);margin-top:2px;}
  .kpi{border-left:4px solid var(--teal);}
  .kpi.aberto{border-left-color:var(--red);}
  .kpi.andamento{border-left-color:var(--amber);}
  .kpi.resolvido{border-left-color:var(--green);}

  .section-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin:0 0 12px;display:flex;align-items:center;gap:8px;}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:30px;font-size:11.5px;font-weight:600;}
  .pill.red{background:var(--red-soft);color:var(--red);}
  .pill.amber{background:var(--amber-soft);color:var(--amber-dk);}
  .pill.green{background:var(--green-soft);color:#2E6B49;}
  .pill.gray{background:var(--gray-soft);color:var(--ink-soft);}
  .pill.teal{background:var(--teal-soft);color:var(--teal-dk);}

  .bars{display:flex;flex-direction:column;gap:9px;}
  .bar-row{display:grid;grid-template-columns:120px 1fr 46px;gap:10px;align-items:center;font-size:12.5px;}
  .bar-track{height:9px;background:var(--gray-soft);border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;}

  .two-col{grid-template-columns:1.3fr 1fr;}
  @media(max-width:820px){.two-col{grid-template-columns:1fr;}}

  /* mapa / polos */
  .cat-edit-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:16px;}
  .cat-edit-row input{width:118px;border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:12.5px;}
  .polos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;}
  .polo-card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .polo-sign{background:var(--teal);color:#fff;padding:11px 14px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;letter-spacing:.4px;text-transform:uppercase;display:flex;align-items:center;gap:8px;border-bottom:3px solid var(--amber);}
  .polo-body{padding:12px 14px;display:flex;flex-direction:column;gap:7px;}
  .city-pin{display:flex;align-items:center;gap:9px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:7px 10px;text-align:left;width:100%;}
  .city-pin:hover{border-color:var(--teal);}
  .pin-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .pin-name{flex:1;font-size:13px;font-weight:500;}
  .pin-count{font-size:11px;font-family:IBM Plex Mono,monospace;color:var(--ink-soft);}

  /* filters */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .filters select, .filters input[type=text]{border:1px solid var(--line);border-radius:9px;padding:7px 10px;background:#fff;}
  .btn{border-radius:9px;padding:8px 14px;font-size:13.5px;font-weight:600;border:none;}
  .btn-primary{background:var(--teal);color:#fff;}
  .btn-primary:hover{background:var(--teal-dk);}
  .btn-ghost{background:var(--gray-soft);color:var(--ink);}
  .btn-ghost:hover{background:var(--line);}
  .btn-amber{background:var(--amber);color:var(--teal-dk);}

  /* form */
  .form-card{display:none;margin-bottom:16px;}
  .form-card.open{display:block;}
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:10px;}
  .form-grid label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--ink-soft);font-weight:600;}
  .form-grid input,.form-grid select,.form-grid textarea{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13.5px;color:var(--ink);}
  .form-grid textarea{resize:vertical;min-height:54px;}
  .full{grid-column:1/-1;}

  /* chamados list */
  .ticket{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;background:#fff;}
  .ticket-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap;}
  .ticket-id{font-size:11px;color:var(--ink-soft);}
  .ticket-title{font-weight:700;font-size:14.5px;margin:2px 0 4px;}
  .ticket-meta{font-size:12px;color:var(--ink-soft);display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
  .ticket-desc{font-size:13px;color:var(--ink-soft);margin-top:6px;line-height:1.45;}
  .ticket-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;}
  .status-select{border:1px solid var(--line);border-radius:30px;padding:5px 10px;font-size:12px;font-weight:700;}
  .icon-btn{background:none;border:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;}
  .empty{text-align:center;padding:40px 20px;color:var(--ink-soft);}
  .empty b{display:block;color:var(--ink);font-size:14px;margin-bottom:4px;}

  /* planejamento table */
  .table-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow);background:#fff;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:980px;}
  thead th{background:var(--teal);color:#fff;text-align:left;padding:10px 10px;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;position:sticky;top:0;}
  tbody td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:nth-child(even){background:#FAFBFA;}
  tbody input,tbody select{width:100%;border:1px solid transparent;border-radius:6px;padding:5px 6px;background:transparent;}
  tbody input:hover,tbody select:hover{border-color:var(--line);background:#fff;}
  tbody input:focus,tbody select:focus{border-color:var(--teal);background:#fff;outline:none;}
  .pct{font-family:IBM Plex Mono,monospace;font-weight:600;}
  .polo-tag{font-size:10.5px;color:var(--ink-soft);}

  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--teal-dk);color:#fff;padding:9px 18px;border-radius:30px;font-size:12.5px;box-shadow:0 4px 16px rgba(0,0,0,.2);opacity:0;transition:opacity .25s;pointer-events:none;z-index:60;}
  .toast.show{opacity:1;}

  /* alertas */
  .alert-banner{display:flex;align-items:center;gap:10px;background:var(--red-soft);border:1px solid #E8B6AC;color:var(--red);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:600;}
  .alert-banner .x{margin-left:auto;background:none;border:none;color:var(--red);font-size:13px;text-decoration:underline;font-weight:600;}
  .alert-mini{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:7px 0;border-bottom:1px dashed var(--line);}
  .alert-mini:last-child{border-bottom:none;}

  /* agenda semanal */
  .week-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;}
  .week-head{background:var(--teal);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
  .week-head .wtitle{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:14.5px;}
  .week-head .wdates{font-size:12px;color:#BFD8D3;}
  .week-body{padding:14px 16px;}
  .entry-row{border:1px solid var(--line);border-radius:11px;padding:10px 12px;margin-bottom:9px;}
  .entry-top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;}
  .cat-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
  .cat-tag{background:var(--teal-soft);color:var(--teal-dk);font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;}
  .entry-status-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
  .reason-box{margin-top:8px;background:var(--bg);border-radius:8px;padding:8px 10px;display:none;}
  .reason-box.show{display:block;}
  .small-select,.small-input{border:1px solid var(--line);border-radius:7px;padding:5px 8px;font-size:12.5px;}
  .week-form{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:14px;}
  .week-form label{display:flex;flex-direction:column;font-size:11.5px;color:var(--ink-soft);font-weight:600;gap:3px;}
  .week-form input{border:1px solid var(--line);border-radius:8px;padding:7px 9px;}
  .entry-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;align-items:end;background:var(--bg);border-radius:10px;padding:10px;margin-bottom:12px;}
  .entry-form label{display:flex;flex-direction:column;font-size:11px;color:var(--ink-soft);font-weight:600;gap:3px;}
  .chip-check{display:flex;gap:5px;flex-wrap:wrap;}
  .chip-check label{flex-direction:row;align-items:center;gap:4px;background:#fff;border:1px solid var(--line);border-radius:7px;padding:4px 8px;font-weight:600;cursor:pointer;}
  .chip-check input{width:auto;}

  /* veiculos */
  .vfilters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
  .vehicle-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;}
  .vehicle-head{background:var(--teal);color:#fff;padding:10px 14px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
  .vehicle-body{padding:12px 14px;}
  .vrow{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin-bottom:8px;flex-wrap:wrap;}
  .vrow .dotbtn{font-size:12px;font-weight:700;border:none;border-radius:30px;padding:6px 12px;line-height:1;color:#fff;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;}
  .vrow .dotbtn.on{background:var(--green);}
  .vrow .dotbtn.on:hover{background:#3D7F58;}
  .vrow .dotbtn.off{background:var(--red);}
  .vrow .dotbtn.off:hover{background:#A8392C;}
  .vrow .dotbtn .dot{width:8px;height:8px;border-radius:50%;background:#fff;display:inline-block;}
  .vrow .vinfo{flex:1;min-width:140px;}
  .vrow .vname{font-weight:700;font-size:13px;}
  .vrow .vsub{font-size:11px;color:var(--ink-soft);}
  .add-vehicle-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;background:var(--bg);border-radius:10px;padding:10px;margin-top:6px;}
  .add-vehicle-form label{display:flex;flex-direction:column;font-size:11px;color:var(--ink-soft);font-weight:600;gap:3px;}

  /* lançamento diário */
  .diario-sep{border:none;border-top:2px dashed var(--line);margin:22px 0 18px;}
  .prog-city{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
  .prog-city-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .prog-city-name{font-weight:700;font-size:14px;}
  .prog-bar-wrap{height:10px;background:var(--gray-soft);border-radius:6px;overflow:hidden;margin:6px 0 4px;}
  .prog-bar-fill{height:100%;border-radius:6px;transition:width .4s;}
  .cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-top:8px;}
  .cat-cell{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 9px;font-size:12px;}
  .cat-cell b{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:2px;}
  .diario-table-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow);background:#fff;margin-top:12px;}
  .nav-mes{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .nav-mes button{background:var(--teal-soft);border:none;border-radius:8px;padding:6px 12px;font-weight:700;color:var(--teal-dk);font-size:13px;}
  .nav-mes .mes-label{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;min-width:130px;text-align:center;}

  /* auth */
  .auth-wrap{min-height:500px;display:flex;align-items:center;justify-content:center;padding:40px 20px;}
  .auth-card{max-width:400px;width:100%;background:#fff;border-radius:18px;box-shadow:0 4px 30px rgba(15,61,62,.13);overflow:hidden;}
  .auth-head{background:linear-gradient(135deg,var(--teal-dk),var(--teal));color:#fff;padding:24px 26px;text-align:center;border-bottom:3px solid var(--amber);}
  .auth-head h2{font-family:'Space Grotesk',sans-serif;font-size:18px;margin:8px 0 2px;}
  .auth-head p{font-size:12px;color:#BFD8D3;margin:0;}
  .auth-body{padding:22px 26px;}
  .auth-body label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-soft);margin-bottom:4px;margin-top:12px;}
  .auth-body label:first-child{margin-top:0;}
  .auth-body input,.auth-body select{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:13.5px;}
  .auth-body input:focus,.auth-body select:focus{outline:none;border-color:var(--teal);}
  .auth-tabs{display:flex;border-bottom:2px solid var(--line);margin-bottom:16px;}
  .auth-tabs button{flex:1;background:none;border:none;padding:10px;font-size:13px;font-weight:700;color:var(--ink-soft);border-bottom:3px solid transparent;margin-bottom:-2px;}
  .auth-tabs button.active{color:var(--teal);border-bottom-color:var(--teal);}
  .auth-pending{text-align:center;padding:30px 20px;}
  .auth-pending .icon{font-size:36px;margin-bottom:10px;}
  .badge-admin{background:var(--amber);color:var(--teal-dk);font-size:10px;font-weight:800;padding:2px 7px;border-radius:30px;vertical-align:middle;margin-left:6px;}

  /* check-in diário */
  .polo-checkin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:16px;}
  .polo-ci{border-radius:11px;overflow:hidden;border:1px solid var(--line);}
  .polo-ci-head{padding:9px 12px;font-weight:700;font-size:12.5px;display:flex;justify-content:space-between;align-items:center;}
  .polo-ci-head.ok{background:var(--green-soft);color:#2E6B49;}
  .polo-ci-head.pend{background:var(--amber-soft);color:var(--amber-dk);}
  .polo-ci-body{padding:8px 12px;font-size:12px;color:var(--ink-soft);background:#fff;}
  /* KPI tático */
  .kpi-tatic-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:16px;}
  .kpi-tatic{border-radius:11px;padding:12px 14px;border-left:4px solid;}
  .kpi-tatic.verde{background:var(--green-soft);border-color:var(--green);}
  .kpi-tatic.amarelo{background:var(--amber-soft);border-color:var(--amber);}
  .kpi-tatic.vermelho{background:var(--red-soft);border-color:var(--red);}
  .kpi-tatic .num{font-family:'Space Grotesk',sans-serif;font-size:26px;font-weight:700;line-height:1;}
  .kpi-tatic .lbl{font-size:11.5px;margin-top:3px;color:var(--ink-soft);}
  .kpi-tatic .meta{font-size:10.5px;margin-top:2px;opacity:.8;}
  /* manutenção */
  .manut-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:30px;font-size:11px;font-weight:700;}
  .manut-ok{background:var(--green-soft);color:#2E6B49;}
  .manut-venc{background:var(--red-soft);color:var(--red);}
  .manut-prox{background:var(--amber-soft);color:var(--amber-dk);}
  /* relatório */
  .rel-bloco{background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:12px;overflow:hidden;}
  .rel-head{background:var(--teal);color:#fff;padding:10px 14px;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
  .rel-body{padding:10px 14px;}
  .rel-linha{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px dashed var(--line);font-size:12.5px;}
  .rel-linha:last-child{border-bottom:none;}
  .rel-val{font-family:IBM Plex Mono,monospace;font-weight:700;}
  .tri-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
  .tri-nav button{background:var(--teal-soft);border:none;border-radius:8px;padding:6px 12px;font-weight:700;color:var(--teal-dk);font-size:13px;}
  .tri-nav .tri-label{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px;min-width:170px;text-align:center;}

  /* histórico de veículos */
  .hist-wrap{border-top:1px solid var(--line);margin-top:10px;padding-top:10px;}
  .hist-tabs{display:flex;gap:4px;margin-bottom:10px;}
  .hist-tab{border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer;}
  .hist-tab.active{background:var(--teal);color:#fff;}
  .hist-tab:not(.active){background:var(--gray-soft);color:var(--ink-soft);}
  .hist-timeline{display:flex;flex-direction:column;gap:0;}
  .hist-entry{display:flex;gap:10px;position:relative;padding-bottom:10px;}
  .hist-entry:last-child{padding-bottom:0;}
  .hist-dot{width:28px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:0;}
  .hist-dot-circle{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px;}
  .hist-dot-line{width:2px;flex:1;background:var(--line);margin-top:3px;}
  .hist-entry:last-child .hist-dot-line{display:none;}
  .hist-content{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:12px;}
  .hist-content .htitle{font-weight:700;color:var(--ink);font-size:12.5px;}
  .hist-content .hmeta{color:var(--ink-soft);font-size:11px;margin-top:2px;}
  .hist-content .hobs{color:var(--ink-soft);margin-top:4px;font-style:italic;border-top:1px dashed var(--line);padding-top:4px;}
  /* checklist */
  .ck-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px;margin-bottom:10px;}
  .ck-item{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12.5px;}

/* ---------------- estado ---------------- */

/* ====================================================================

var SUPA_URL = '';

var sb = null;

function loadSupaCredentials(){

var _supaLastUrl = '';
var _supaLastKey = '';

function initSupaClient(){
  if(!SUPA_URL || !SUPA_KEY) return;
  // Já existe um cliente com as mesmas credenciais — reutiliza
  if(sb && SUPA_URL === _supaLastUrl && SUPA_KEY === _supaLastKey) return;
  if(window.supabase && window.supabase.createClient){
    try{
      sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, {
        auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false }
      });
      _supaLastUrl = SUPA_URL;
      _supaLastKey = SUPA_KEY;
    }
    catch(e){ sb = null; }
  }
}

function supabaseConfigured(){ return !!(SUPA_URL && SUPA_KEY && sb); }

/* ---------------- storage helpers (Supabase → localStorage) ---------------- */
var LS_PREFIX = 'painelpe_';

async function storageGet(key, shared){
  if(shared && supabaseConfigured()){
    try{
      var res = await sb.from('kv_store').select('value').eq('key', key).maybeSingle();
      if(res.error) throw res.error;
      return res.data ? res.data.value : null;
    }catch(e){ console.error('storageGet', e); return null; }
  }
  try{ var raw = localStorage.getItem(LS_PREFIX + key); return raw === null ? null : raw; }
  catch(e){ return null; }
}

async function storageSet(key, value, shared){
  if(shared && supabaseConfigured()){
    try{
      var res = await sb.from('kv_store').upsert({key:key, value:value, updated_at: new Date().toISOString()},{onConflict:'key'});
      if(res.error) throw res.error;
      return true;
    }catch(e){ console.error('storageSet', e); showToast('Erro ao salvar no banco. Verifique as credenciais.'); return false; }
  }
  try{ localStorage.setItem(LS_PREFIX + key, value); return true; }
  catch(e){ showToast('Não foi possível salvar neste navegador.'); return false; }
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2200);
}

/* ---------------- utilitários de auth ---------------- */
var ADMIN_NOME = 'Carlos Wolney';
async function hashSenha(senha){
  var enc = new TextEncoder();
  var data = enc.encode(senha + '_painelpe_2026');
  var hashBuf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}
function isAdmin(u){ return u && u.isAdmin === true; }
function nomeSemAcento(s){ return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function isAdminNome(nome){ return nomeSemAcento(nome).indexOf('carlos') > -1 && nomeSemAcento(nome).indexOf('wolney') > -1; }
function setSessao(usuario){
  state.sessao = usuario;
  state.perfil = {nome: usuario.nome, papel: usuario.cargo};
  try{ localStorage.setItem('painelpe_sessao', JSON.stringify({id: usuario.id})); }catch(e){}
}
function clearSessao(){
  state.sessao = null; state.perfil = null;
  try{ localStorage.removeItem('painelpe_sessao'); }catch(e){}
}

/* ---------------- init ---------------- */
async function init(){
  loadSupaCredentials();
  initSupaClient();

  var [ch, pl, cl, sm, vc, di, us, ci] = await Promise.all([
    storageGet('chamados-lista', true),
    storageGet('planejamento-lista', true),
    storageGet('categoria-labels', true),
    storageGet('semanas-lista', true),
    storageGet('veiculos-lista', true),
    storageGet('diarios-lista', true),
    storageGet('usuarios-lista', true),
    storageGet('checkins-lista', true)
  ]);

  state.chamados  = ch ? JSON.parse(ch) : [];
  state.catLabels = cl ? JSON.parse(cl) : Object.assign({}, DEFAULT_CAT_LABELS);
  state.semanas   = sm ? JSON.parse(sm) : [];
  state.veiculos  = vc ? JSON.parse(vc) : [];
  state.diarios   = di ? JSON.parse(di) : [];
  state.usuarios  = us ? JSON.parse(us) : [];
  state.checkins  = ci ? JSON.parse(ci) : [];

  var mc = await storageGet('meta-config', true);
  state.metaConfig = mc ? JSON.parse(mc) : {};
  var dm = await storageGet('demandas-lista', true);
  state.demandas = dm ? JSON.parse(dm) : [];

  var pa = await storageGet('plan-acesso', true);
  state.planAcesso = pa ? JSON.parse(pa) : [];

  if(pl){
    state.planejamento = JSON.parse(pl);
  } else {
    state.planejamento = TODAS_CIDADES.map(function(c){
      var p = CIDADE_POLO[c];
      return {cidade:c, poloId:p.id, poloNome:p.nome+' — '+p.regiao, responsavel:'', papel:'', metaMensal:0, diasPrevistos:'', qtdRealizada:0, status:'Planejado', observacoes:'', atualizadoPor:'', atualizadoEm:''};
    });
    await storageSet('planejamento-lista', JSON.stringify(state.planejamento), true);
  }

  // restaura sessão
  try{
    var sessaoStr = localStorage.getItem('painelpe_sessao');
    if(sessaoStr){
      var sessaoSalva = JSON.parse(sessaoStr);
      var u = state.usuarios.filter(function(x){ return x.id === sessaoSalva.id && x.status === 'aprovado'; })[0];
      if(u){ setSessao(u); }
    }
  }catch(e){}

  document.getElementById('loading').style.display='none';
  document.getElementById('shell').style.display='block';

  if(!state.sessao){ renderAuth(); }
  else { renderShellForUser(); }
}

window.__login = async function(){
  var nome  = (document.getElementById('au-nome').value  || '').trim();
  var senha = (document.getElementById('au-senha').value || '').trim();
  if(!nome || !senha){ showToast('Preencha nome e senha.'); return; }
  var hash = await hashSenha(senha);
  var u = state.usuarios.filter(function(x){ return nomeSemAcento(x.nome)===nomeSemAcento(nome) && x.senhaHash===hash; })[0];
  if(!u){ showToast('Nome ou senha incorretos.'); return; }
  if(u.status==='pendente'){
    document.getElementById('authArea').innerHTML = '<div class="auth-card"><div class="auth-head"><h2>Acesso pendente</h2><p>Aguarde a aprovação</p></div>'+
      '<div class="auth-body"><div class="auth-pending"><div class="icon">⏳</div>'+
      '<p>Olá, <b>'+esc(u.nome)+'</b>! Seu cadastro está aguardando aprovação de <b>'+ADMIN_NOME+'</b>.</p>'+
      '<p style="font-size:12px;color:var(--ink-soft);">Assim que for aprovado, você poderá acessar o painel.</p>'+
      '<button class="btn btn-ghost" style="margin-top:12px;" onclick="window.__authCard(\'login\')">Voltar</button>'+
      '</div></div></div>';
    return;
  }
  if(u.status==='rejeitado'){ showToast('Seu acesso foi recusado pelo administrador.'); return; }
  setSessao(u);
  renderShellForUser();
};

window.__cadastrar = async function(){
  var nome   = (document.getElementById('au-nome').value   || '').trim();
  var cargo  = (document.getElementById('au-cargo').value  || '').trim();
  var senha  = (document.getElementById('au-senha').value  || '').trim();
  var senha2 = (document.getElementById('au-senha2').value || '').trim();
  if(!nome)           { showToast('Informe o nome.'); return; }
  if(senha.length < 6){ showToast('A senha deve ter ao menos 6 caracteres.'); return; }
  if(senha !== senha2){ showToast('As senhas não coincidem.'); return; }
  var existe = state.usuarios.filter(function(x){ return nomeSemAcento(x.nome)===nomeSemAcento(nome); })[0];
  if(existe){ showToast('Já existe um cadastro com esse nome.'); return; }
  var hash   = await hashSenha(senha);
  var adminAuto = isAdminNome(nome);
  var novo = {
    id: 'U'+Date.now().toString(36).toUpperCase(),
    nome: nome, cargo: cargo, senhaHash: hash,
    status: adminAuto ? 'aprovado' : 'pendente',
    isAdmin: adminAuto,
    criadoEm: nowStr(), aprovadoPor: adminAuto ? 'auto' : '', aprovadoEm: adminAuto ? nowStr() : ''
  };
  state.usuarios.push(novo);
  await storageSet('usuarios-lista', JSON.stringify(state.usuarios), true);
  if(adminAuto){
    setSessao(novo);
    renderShellForUser();
  } else {
    showToast('Cadastro enviado! Aguarde a aprovação.');
    renderAuthCard('login');
  }
};

    '</div>'+

};

window.__salvarSupaConfig = async function(){
  var url = (document.getElementById('supa-url-input').value || '').trim();
  var key = (document.getElementById('supa-key-input').value || '').trim();
  if(!url || !key){ showToast('Preencha os dois campos.'); return; }
  if(!url.startsWith('https://')){ showToast('A URL deve começar com https://'); return; }
  try{
    localStorage.setItem('painelpe_supa_url', url);
    localStorage.setItem('painelpe_supa_key', key);
  }catch(e){}
  SUPA_URL = url; SUPA_KEY = key;
  initSupaClient();
  if(!sb){ showToast('Não foi possível iniciar o cliente Supabase. Verifique os dados.'); return; }
  showToast('Conectando ao banco…');
  // test connection
  try{
    var test = await sb.from('kv_store').select('key').limit(1);
    if(test.error) throw test.error;
  }catch(e){
    showToast('Erro ao conectar: ' + (e.message||'verifique URL e chave'));
    return;
  }
  showToast('Conectado! Sincronizando dados…');
  renderConfigBanner();
  renderProfileBox();
  startAutoSync();
  await window.__sincronizar(true);
  showToast('✅ Banco conectado com sucesso!');
};

window.__sincronizar = async function(silent){
  if(!silent) showToast('Sincronizando com o banco…');
  var [ch, pl, cl, sm, vc, di, us] = await Promise.all([
    storageGet('chamados-lista', true),
    storageGet('planejamento-lista', true),
    storageGet('categoria-labels', true),
    storageGet('semanas-lista', true),
    storageGet('veiculos-lista', true),
    storageGet('diarios-lista', true),
    storageGet('usuarios-lista', true)
  ]);
  if(ch) state.chamados = JSON.parse(ch);
  if(pl) state.planejamento = JSON.parse(pl);
  if(cl) state.catLabels = JSON.parse(cl);
  if(sm) state.semanas = JSON.parse(sm);
  if(vc) state.veiculos = JSON.parse(vc);
  if(di) state.diarios = JSON.parse(di);
  var ci2 = await storageGet('checkins-lista', true);
  if(ci2) state.checkins = JSON.parse(ci2);
  var mc2 = await storageGet('meta-config', true);
  if(mc2) state.metaConfig = JSON.parse(mc2);
  var dm2 = await storageGet('demandas-lista', true);
  if(dm2) state.demandas = JSON.parse(dm2);
  if(us){ state.usuarios = JSON.parse(us);
    // atualiza sessão se o usuário foi aprovado/revogado
    if(state.sessao){
      var u = state.usuarios.filter(function(x){ return x.id===state.sessao.id; })[0];
      if(u && u.status==='aprovado') setSessao(u);
      else if(u && u.status!=='aprovado'){ clearSessao(); renderAuth(); return; }
    }
  }
  if(!silent) showToast('Dados atualizados.');
  if(state.sessao) setTab(state.activeTab);
};

function statusPillClass(s){

var SLA_HORAS = {'Crítica':6,'Alta':24,'Média':48,'Baixa':72};
function isAtrasado(c){
  if(!isOpenStatus(c.status)) return false;
  if(!c.criadoTs) return false;
  var sla = SLA_HORAS[c.prioridade] || 48;
  return (Date.now() - c.criadoTs) > sla*3600*1000;
}
function horasAberto(c){
  if(!c.criadoTs) return 0;
  return Math.floor((Date.now()-c.criadoTs)/3600000);
}
function chamadosAtrasados(){ return state.chamados.filter(isAtrasado); }

/* exames agendados para hoje nas semanas */
function examesHoje(data){
  var lista = [];
  state.semanas.forEach(function(w){
    (w.entradas||[]).forEach(function(e){
      var cats = [];
      if(e.datasExatas){ ['C','D','E'].forEach(function(k){ if(e.datasExatas[k]===data && e.categorias.indexOf(k)>-1) cats.push(k); }); }
      else if(e.dataExata===data){ cats = e.categorias.filter(function(c){return c==='C'||c==='D'||c==='E';}); }
      var abCats = e.categorias.filter(function(c){return c==='A'||c==='B';});
      if(abCats.length && w.inicio && w.fim){
        var di = dataParaDisplay(data);
        function toISO(s){ var p=s.split('/'); return p[2]+'-'+p[1]+'-'+p[0]; }
        var wIni = w.inicio.indexOf('/')>-1 ? toISO(w.inicio) : w.inicio;
        var wFim = w.fim.indexOf('/')>-1   ? toISO(w.fim)   : w.fim;
        if(data >= wIni && data <= wFim) cats = cats.concat(abCats);
      }
      if(cats.length) lista.push({cidade:e.cidade, polo:CIDADE_POLO[e.cidade], cats:cats, status:e.status});
    });
  });
  return lista;
}

window.__saveCatLabel = async function(k, val){
  state.catLabels[k] = val || DEFAULT_CAT_LABELS[k];
  await storageSet('categoria-labels', JSON.stringify(state.catLabels), true);
  showToast('Nome da categoria atualizado.');
};

window.__filtrarCidade = function(cidade){
  state.filtros = {polo:CIDADE_POLO[cidade].id, cidade:cidade, categoria:'', status:'', q:''};

};

function filteredChamados(){
  var f = state.filtros;
  return state.chamados.filter(function(c){
    if(f.polo && c.poloId!==f.polo) return false;
    if(f.cidade && c.cidade!==f.cidade) return false;
    if(f.categoria && c.categoria!==f.categoria) return false;
    if(f.status && c.status!==f.status) return false;
    if(f.tipoProblema && c.tipoProblema!==f.tipoProblema) return false;
    if(f.q && c.titulo.toLowerCase().indexOf(f.q.toLowerCase())===-1) return false;
    return true;
  }).sort(function(a,b){ return (b.criadoEm||'').localeCompare(a.criadoEm||''); });
}

        '<button class="icon-btn" onclick="window.__excluirChamado(\''+c.id+'\')">excluir</button>'+
      '</div>'+
    '</div>';
  }).join('');
}

window.__setFiltro = function(key, val){
  state.filtros[key] = val;
  if(key==='polo') state.filtros.cidade='';
  if(state.activeTab==='chamados'){
    if(key==='polo'){ renderChamadosTab(); } else { renderChamadosList(); }
  }
};
window.__limparFiltros = function(){
  state.filtros = {polo:'', cidade:'', categoria:'', status:'', tipoProblema:'', q:''};
  renderChamadosTab();
};
window.__toggleForm = function(){
  state.formOpen = !state.formOpen;
  document.getElementById('formCard').className = 'card form-card'+(state.formOpen?' open':'');
};
window.__draftPolo = function(val){
  state.draftChamado.polo = val;
  state.draftChamado.cidade = '';
  renderChamadosTab();
  state.formOpen = true;
  document.getElementById('formCard').className = 'card form-card open';
};

window.__criarChamado = async function(){
  var d = state.draftChamado;
  if(!d.polo || !d.cidade){ showToast('Selecione o polo e a cidade.'); return; }
  if(!d.titulo.trim()){ showToast('Dê um título ao chamado.'); return; }
  if(!d.tipoProblema){ showToast('Selecione o tipo de problema.'); return; }
  var novo = {
    id: genId(), polo:d.polo, poloId:d.polo, cidade:d.cidade, categoria:d.categoria, tipoProblema:d.tipoProblema,
    prioridade:d.prioridade, titulo:d.titulo.trim(), descricao:d.descricao.trim(),
    status:'Aberto', responsavelNome:state.perfil.nome, responsavelPapel:state.perfil.papel,
    criadoEm:nowStr(), atualizadoEm:nowStr(), criadoTs:Date.now()
  };
  state.chamados.unshift(novo);
  await storageSet('chamados-lista', JSON.stringify(state.chamados), true);
  state.draftChamado = {polo:'', cidade:'', categoria:'A', tipoProblema:'', prioridade:'Média', titulo:'', descricao:''};
  state.formOpen = false;
  showToast('Chamado '+novo.id+' aberto.');
  renderChamadosTab();
};

window.__mudarStatus = async function(id, novoStatus){
  var c = state.chamados.filter(function(x){return x.id===id;})[0];
  if(!c) return;
  c.status = novoStatus;
  c.atualizadoEm = nowStr();
  c.atualizadoPor = state.perfil.nome+' ('+state.perfil.papel+')';
  await storageSet('chamados-lista', JSON.stringify(state.chamados), true);
  showToast('Status atualizado para "'+novoStatus+'".');
  renderChamadosList();
};

window.__excluirChamado = async function(id){
  if(!confirm('Excluir este chamado? Essa ação não pode ser desfeita.')) return;
  state.chamados = state.chamados.filter(function(x){return x.id!==id;});
  await storageSet('chamados-lista', JSON.stringify(state.chamados), true);
  showToast('Chamado excluído.');
  renderChamadosList();
};

window.__exportarChamados = function(){
  var rows = [['ID','Título','Cidade','Polo','Categoria','Tipo de problema','Prioridade','Status','Responsável','Papel','Criado em','Atualizado em','Descrição']];
  filteredChamados().forEach(function(c){
    rows.push([c.id,c.titulo,c.cidade,CIDADE_POLO[c.cidade].nome,catLabel(c.categoria),c.tipoProblema||'',c.prioridade,c.status,c.responsavelNome,c.responsavelPapel,c.criadoEm,c.atualizadoEm||'',c.descricao||'']);
  });
  downloadCSV(rows, 'chamados.csv');
};

/* ===================================================================
   PLANEJAMENTO
=================================================================== */
function nomeMes(anoMes){
  var partes = anoMes.split('-');
  var meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return meses[parseInt(partes[1],10)-1]+' / '+partes[0];
}
function mesAnterior(anoMes){
  var d = new Date(anoMes+'-01'); d.setMonth(d.getMonth()-1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function mesProximo(anoMes){
  var d = new Date(anoMes+'-01'); d.setMonth(d.getMonth()+1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}
function dataParaMes(dataISO){ return dataISO ? dataISO.slice(0,7) : ''; }
function dataParaDisplay(dataISO){
  if(!dataISO) return '';
  var p = dataISO.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}

function renderPlanejamentoTab(){

  '</div>';

    '<th>Cidade</th><th>Polo</th><th>Responsável</th><th>Papel</th><th>Meta mensal</th><th>Dias previstos</th><th>Dias c/ lançamento</th><th>Realizado (auto)</th><th>% Meta</th><th>Status</th><th>Obs.</th>'+
  '</tr></thead><tbody>'+
    state.planejamento.map(function(row, idx){
      return '<tr>'+
        '<td><b>'+esc(row.cidade)+'</b></td>'+
        '<td class="polo-tag">'+esc(row.poloNome)+'</td>'+
        '<td><input type="text" value="'+esc(row.responsavel)+'" placeholder="nome" onchange="window.__planUpdate('+idx+', \'responsavel\', this.value)"></td>'+
        '<td><select onchange="window.__planUpdate('+idx+', \'papel\', this.value)">'+
          '<option value="">—</option>'+ PAPEIS.map(function(p){return '<option value="'+p+'"'+(p===row.papel?' selected':'')+'>'+esc(p)+'</option>';}).join('') +
        '</select></td>'+
        '<td><input type="number" min="0" value="'+row.metaMensal+'" onchange="window.__planUpdate('+idx+', \'metaMensal\', this.value, true)"></td>'+
        '<td><input type="text" value="'+esc(row.diasPrevistos)+'" placeholder="ex: 3x/sem" onchange="window.__planUpdate('+idx+', \'diasPrevistos\', this.value)"></td>'+
        (function(){
          var dias = diasComLancamento(row.cidade);
          return '<td style="text-align:center;"><b class="mono">'+dias+'</b>'+
            '<div style="font-size:10.5px;color:var(--ink-soft);">dias no mês</div></td>';
        })()+
        '<td style="text-align:center;"><b class="mono">'+realizadoMesAtual(row.cidade)+'</b>'+
          '<div style="font-size:10.5px;color:var(--ink-soft);">'+agendadosMesAtual(row.cidade)+' agend.</div></td>'+
        (function(){
          var re=realizadoMesAtual(row.cidade); var mt=row.metaMensal||0;
          var pct=mt>0?Math.round(re/mt*100):0;
          var cor=pct>=100?'var(--green)':pct>=60?'var(--amber-dk)':'var(--red)';
          return '<td><span class="mono" style="font-weight:700;color:'+cor+';">'+pct+'%</span>'+
            '<div style="height:5px;background:var(--gray-soft);border-radius:3px;margin-top:3px;overflow:hidden;"><div style="width:'+Math.min(100,pct)+'%;height:100%;background:'+cor+';border-radius:3px;"></div></div>'+
          '</td>';
        })()+
        '<td><select style="font-weight:700;" onchange="window.__planUpdate('+idx+', \'status\', this.value)">'+
          STATUS_PLAN.map(function(s){return '<option value="'+s+'"'+(s===row.status?' selected':'')+'>'+esc(s)+'</option>';}).join('') +
        '</select></td>'+
        '<td><input type="text" value="'+esc(row.observacoes)+'" placeholder="notas…" onchange="window.__planUpdate('+idx+', \'observacoes\', this.value)"></td>'+
      '</tr>';
    }).join('') +
  '</tbody></table></div>';
  html += '<div style="font-size:11.5px;color:var(--ink-soft);margin-top:8px;">Alterações salvas automaticamente e visíveis para todos os perfis.</div>';

  /* --- separador --- */
  html += '<hr class="diario-sep">';

  /* --- cabeçalho da seção diária --- */
  html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px;">'+
    '<div class="section-title" style="margin:0;">📊 Lançamento diário de exames</div>'+
    '<button class="btn btn-amber" onclick="window.__exportarDiarios()">⬇ Exportar CSV diários</button>'+
  '</div>';

  /* --- formulário de lançamento --- */
  html += '<div class="card" style="margin-bottom:16px;">'+
    '<div class="section-title" style="font-size:13px;">Registrar exames do dia</div>'+
    '<div class="form-grid">'+
      '<label>Cidade<select id="di-cidade"><option value="">Selecione</option>'+
        TODAS_CIDADES.map(function(c){return '<option value="'+esc(c)+'">'+esc(c)+' ('+esc(CIDADE_POLO[c].nome)+')</option>';}).join('')+
      '</select></label>'+
      '<label>Data<input id="di-data" type="date" value="'+new Date().toISOString().slice(0,10)+'"></label>'+
      '<label>Categoria<select id="di-cat">'+
        CAT_KEYS.map(function(k){return '<option value="'+k+'">'+esc(catLabel(k))+'</option>';}).join('')+
      '</select></label>'+
      '<label>Agendados<input id="di-agend" type="number" min="0" placeholder="0" value="0"></label>'+
      '<label>Realizados<input id="di-real" type="number" min="0" placeholder="0" value="0"></label>'+
      '<label style="align-self:flex-end;"><button class="btn btn-primary" style="width:100%;" onclick="window.__addDiario()">+ Registrar</button></label>'+
    '</div>'+
  '</div>';

  /* --- seletor de mês --- */
  html += '<div class="nav-mes">'+
    '<button onclick="window.__mesAnterior()">← Mês anterior</button>'+
    '<span class="mes-label">'+nomeMes(mes)+'</span>'+
    '<button onclick="window.__mesProximo()">Próximo mês →</button>'+
  '</div>';

  /* --- progresso por cidade --- */
  html += '<div class="section-title" style="font-size:13px;">Progresso por cidade — '+nomeMes(mes)+'</div>';

  var cidadesComLancamento = state.planejamento.filter(function(row){
    return row.metaMensal > 0 || diariosMes.some(function(d){ return d.cidade===row.cidade; });
  });

  if(!cidadesComLancamento.length){
    html += '<div class="empty card"><b>Nenhuma meta ou lançamento encontrado.</b>Configure a meta mensal na tabela acima e registre os exames do dia.</div>';
  } else {
    cidadesComLancamento.forEach(function(row){
      var lancamentos = diariosMes.filter(function(d){ return d.cidade===row.cidade; });
      var totalAgendados = lancamentos.reduce(function(s,d){ return s+d.agendados; }, 0);
      var totalRealizados = lancamentos.reduce(function(s,d){ return s+d.realizados; }, 0);
      var meta = row.metaMensal || 0;
      var pct = meta > 0 ? Math.min(100, Math.round(totalRealizados/meta*100)) : 0;
      var barColor = pct >= 100 ? 'var(--green)' : pct >= 60 ? 'var(--amber)' : 'var(--red)';

      /* breakdown por categoria */
      var porCatHTML = CAT_KEYS.map(function(k){
        var lk = lancamentos.filter(function(d){ return d.categoria===k; });
        if(!lk.length) return '';
        var ag = lk.reduce(function(s,d){return s+d.agendados;},0);
        var re = lk.reduce(function(s,d){return s+d.realizados;},0);
        return '<div class="cat-cell"><b>'+esc(catLabel(k))+'</b>'+
          '<span>Agend.: <b>'+ag+'</b></span> &nbsp; <span>Realiz.: <b>'+re+'</b></span>'+
        '</div>';
      }).join('');

      html += '<div class="prog-city">'+
        '<div class="prog-city-head">'+
          '<div>'+
            '<span class="prog-city-name">'+esc(row.cidade)+'</span>'+
            ' <span class="polo-tag">'+esc(row.poloNome)+'</span>'+
          '</div>'+
          '<div style="text-align:right;font-size:12.5px;">'+
            'Meta: <b>'+meta+'</b> &nbsp;|&nbsp; Agendados: <b>'+totalAgendados+'</b> &nbsp;|&nbsp; Realizados: <b>'+totalRealizados+'</b>'+
            ' &nbsp;<span style="font-family:IBM Plex Mono,monospace;font-size:13px;font-weight:700;color:'+barColor+';">'+pct+'%</span>'+
          '</div>'+
        '</div>'+
        '<div class="prog-bar-wrap"><div class="prog-bar-fill" style="width:'+pct+'%;background:'+barColor+';"></div></div>'+
        (porCatHTML ? '<div class="cat-grid">'+porCatHTML+'</div>' : '')+
      '</div>';
    });
  }

  /* --- tabela de lançamentos do mês --- */
  if(diariosMes.length){
    var ordenados = diariosMes.slice().sort(function(a,b){ return b.dataISO.localeCompare(a.dataISO); });
    html += '<div class="section-title" style="font-size:13px;margin-top:18px;">Lançamentos de '+nomeMes(mes)+'</div>';
    html += '<div class="diario-table-wrap"><table><thead><tr>'+
      '<th>Data</th><th>Cidade</th><th>Polo</th><th>Categoria</th><th>Agendados</th><th>Realizados</th><th>Registrado por</th><th></th>'+
    '</tr></thead><tbody>'+
    ordenados.map(function(d){
      var taxa = d.agendados>0 ? Math.round(d.realizados/d.agendados*100) : 0;
      return '<tr>'+
        '<td>'+esc(dataParaDisplay(d.dataISO))+'</td>'+
        '<td><b>'+esc(d.cidade)+'</b></td>'+
        '<td class="polo-tag">'+esc(CIDADE_POLO[d.cidade].nome)+'</td>'+
        '<td><span class="pill teal">'+esc(catLabel(d.categoria))+'</span></td>'+
        '<td class="mono">'+d.agendados+'</td>'+
        '<td class="mono">'+d.realizados+' <span style="font-size:11px;color:var(--ink-soft);">('+taxa+'%)</span></td>'+
        '<td style="font-size:11.5px;color:var(--ink-soft);">'+esc(d.registradoPor)+'</td>'+
        '<td><button class="icon-btn" onclick="window.__excluirDiario(\''+d.id+'\')">excluir</button></td>'+
      '</tr>';
    }).join('') +
    '</tbody></table></div>';
  }

  /* ============================================================
     BLOCO DE NOTAS / DEMANDAS
  ============================================================ */

  html += '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:14px;">'+

    '<span style="font-size:12px;color:var(--ink-soft);">Tarefas com prioridade, prazo e cidade</span>'+
  '</div>';

  /* formulário nova demanda */
  html += '<div class="card" style="margin-bottom:14px;">'+
    '<div class="section-title" style="font-size:13px;">Nova demanda</div>'+
    '<div class="form-grid">'+
      '<label>Cidade<select id="dm-cidade"><option value="">Geral (sem cidade)</option>'+
        TODAS_CIDADES.map(function(c){ return '<option value="'+esc(c)+'">'+esc(c)+' ('+esc(CIDADE_POLO[c].nome)+')</option>'; }).join('')+
      '</select></label>'+
      '<label>Prazo<input id="dm-prazo" type="date" value="'+new Date().toISOString().slice(0,10)+'"></label>'+
      '<label>Prioridade<select id="dm-prio">'+
        '<option value="Alto">🔴 Alto</option>'+
        '<option value="Médio" selected>🟡 Médio</option>'+
        '<option value="Baixo">🟢 Baixo</option>'+
      '</select></label>'+
      '<label class="full">Descrição<input id="dm-nota" type="text" placeholder="Ex: Programar revisão preventiva — veículo 39 em Caruaru"></label>'+
    '</div>'+
    '<button class="btn btn-primary" onclick="window.__addDemanda()">+ Adicionar demanda</button>'+
  '</div>';

  /* filtros de prioridade */
  var fpd = state.filtroPrioDemanda || 'Todas';
  html += '<div class="filtro-prio">'+
    ['Todas','Alto','Médio','Baixo'].map(function(p){
      var bg = p==='Alto'?'#FDDEDE':p==='Médio'?'var(--amber-soft)':p==='Baixo'?'var(--green-soft)':'var(--gray-soft)';
      var cor = p==='Alto'?'#C44536':p==='Médio'?'var(--amber-dk)':p==='Baixo'?'#2E6B49':'var(--ink)';
      var lbl = p==='Alto'?'🔴 Alto':p==='Médio'?'🟡 Médio':p==='Baixo'?'🟢 Baixo':'Todas';
      return '<button style="background:'+bg+';color:'+cor+';" class="'+(fpd===p?'ativo':'')+'" onclick="window.__filtroPrio(\''+p+'\')">'+lbl+'</button>';
    }).join('')+
  '</div>';

  /* helper urgência: combina prioridade + dias restantes */
  var hoje2 = new Date().toISOString().slice(0,10);
  function demandaVis(d){
    var prio = d.prioridade || 'Médio';
    var dias = d.prazo ? Math.round((new Date(d.prazo)-new Date(hoje2))/(1000*60*60*24)) : 999;
    var borda, bg, urgKey, prazoTxt='';
    if(prio==='Alto'){
      if(dias<0)    { borda='#C44536'; bg='#FDDEDE'; urgKey=0; }
      else if(dias===0){ borda='#C44536'; bg='#FFE8E5'; urgKey=1; }
      else if(dias<=3) { borda='#E07000'; bg='#FFE8E5'; urgKey=2; }
      else if(dias<=7) { borda='var(--amber)'; bg='var(--amber-soft)'; urgKey=3; }
      else             { borda='#C44536'; bg='#FFF2F0'; urgKey=4; }
    } else if(prio==='Médio'){
      if(dias<0)    { borda='var(--amber)'; bg='var(--amber-soft)'; urgKey=10; }
      else if(dias===0){ borda='var(--amber)'; bg='#FBE7C5'; urgKey=11; }
      else if(dias<=3) { borda='var(--amber)'; bg='var(--amber-soft)'; urgKey=12; }
      else             { borda='var(--amber)'; bg='#FFFBF4'; urgKey=13; }
    } else {
      if(dias<0)    { borda='var(--amber)'; bg='var(--amber-soft)'; urgKey=20; }
      else if(dias===0){ borda='var(--green)'; bg='var(--green-soft)'; urgKey=21; }
      else             { borda='var(--green)'; bg='#F4FBF6'; urgKey=22; }

    if(d.prazo){
      if(dias<0)        prazoTxt='<b style="color:var(--red);"> (VENCIDA há '+Math.abs(dias)+'d!)</b>';

      else if(dias<=3)  prazoTxt='<b style="color:var(--amber-dk);"> (em '+dias+'d)</b>';
    }
    return {borda:borda, bg:bg, urgKey:urgKey, prazoTxt:prazoTxt};
  }

  /* listas */
  var pendentes2 = state.demandas
    .filter(function(d){ return d.status!=='Concluída' && (fpd==='Todas'||(d.prioridade||'Médio')===fpd); })
    .slice().sort(function(a,b){ return demandaVis(a).urgKey - demandaVis(b).urgKey; });
  var concluidas = state.demandas.filter(function(d){ return d.status==='Concluída'; });
  var totalPend  = state.demandas.filter(function(d){ return d.status!=='Concluída'; }).length;

  if(!state.demandas.length){
    html += '<div class="empty card"><b>Nenhuma demanda registrada.</b>Use o formulário acima para adicionar.</div>';
  } else {
    /* contador por prioridade */
    var cnt = {Alto:0,'Médio':0,Baixo:0};
    state.demandas.filter(function(d){return d.status!=='Concluída';}).forEach(function(d){ cnt[d.prioridade||'Médio']++; });
    html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px;font-size:12.5px;align-items:center;">'+
      '<span class="prio-badge prio-alto">🔴 Alto: '+cnt['Alto']+'</span>'+
      '<span class="prio-badge prio-medio">🟡 Médio: '+cnt['Médio']+'</span>'+
      '<span class="prio-badge prio-baixo">🟢 Baixo: '+cnt['Baixo']+'</span>'+
      '<span style="color:var(--ink-soft);">Total pendentes: '+totalPend+'</span>'+
    '</div>';

    if(pendentes2.length){
      pendentes2.forEach(function(d){
        var vis  = demandaVis(d);
        var prio = d.prioridade || 'Médio';
        var pcls = prio==='Alto'?'prio-alto':prio==='Médio'?'prio-medio':'prio-baixo';
        html += '<div class="demanda-card" style="border-left-color:'+vis.borda+';background:'+vis.bg+';">'+
          '<input type="checkbox" class="demanda-check" onchange="window.__concluirDemanda(\''+d.id+'\',this.checked)" title="Marcar como concluída">'+
          '<div class="demanda-body">'+
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">'+
              '<span class="prio-badge '+pcls+'">'+(prio==='Alto'?'🔴':prio==='Médio'?'🟡':'🟢')+' '+esc(prio)+'</span>'+
              '<span class="demanda-titulo">'+esc(d.nota)+'</span>'+
            '</div>'+
            '<div class="demanda-meta">'+
              (d.cidade?'<span>📍 <b>'+esc(d.cidade)+'</b></span>':'<span>🌐 Geral</span>')+
              (d.prazo?'<span>📅 '+dataParaDisplay(d.prazo)+vis.prazoTxt+'</span>':'')+
              '<span style="color:var(--ink-soft);">'+esc(d.criadoPor||'')+'</span>'+
            '</div>'+
          '</div>'+
          '<button class="icon-btn" onclick="window.__excluirDemanda(\''+d.id+'\')">excluir</button>'+
        '</div>';
      });
    } else {
      html += '<div style="font-size:12.5px;color:var(--ink-soft);padding:10px;">Nenhuma demanda '+(fpd!=='Todas'?'com prioridade <b>'+esc(fpd)+'</b> ':'')+'pendente.</div>';
    }

    if(concluidas.length){
      html += '<details style="margin-top:10px;"><summary style="cursor:pointer;font-size:12.5px;color:var(--ink-soft);font-weight:700;">✅ Concluídas ('+concluidas.length+')</summary><div style="margin-top:8px;">';
      concluidas.forEach(function(d){
        var prio = d.prioridade||'Médio';
        var pcls = prio==='Alto'?'prio-alto':prio==='Médio'?'prio-medio':'prio-baixo';
        html += '<div class="demanda-card ok">'+

window.__addDiario = async function(){
  var cidade   = document.getElementById('di-cidade').value;
  var dataISO  = document.getElementById('di-data').value;
  var cat      = document.getElementById('di-cat').value;
  var agend    = parseInt(document.getElementById('di-agend').value,10) || 0;
  var real     = parseInt(document.getElementById('di-real').value,10)  || 0;
  if(!cidade)  { showToast('Selecione a cidade.'); return; }
  if(!dataISO) { showToast('Informe a data.'); return; }
  if(real > agend){ showToast('Realizados não pode ser maior que Agendados.'); return; }
  var novo = {
    id: 'DI'+Date.now().toString(36).toUpperCase(),
    cidade: cidade,
    dataISO: dataISO,
    mes: dataParaMes(dataISO),
    categoria: cat,
    agendados: agend,
    realizados: real,
    registradoPor: state.perfil.nome+' ('+state.perfil.papel+')',
    registradoEm: nowStr()
  };
  state.diarios.push(novo);
  await storageSet('diarios-lista', JSON.stringify(state.diarios), true);
  showToast('Lançamento registrado — '+esc(cidade)+' / '+esc(catLabel(cat))+' em '+dataParaDisplay(dataISO));
  state.mesSelecionado = dataParaMes(dataISO);
  renderPlanejamentoTab();
};

window.__excluirDiario = async function(id){
  if(!confirm('Excluir este lançamento?')) return;
  state.diarios = state.diarios.filter(function(d){ return d.id!==id; });
  await storageSet('diarios-lista', JSON.stringify(state.diarios), true);
  showToast('Lançamento excluído.');
  renderPlanejamentoTab();
};

/* --- demandas / bloco de notas --- */
window.__filtroPrio = function(prio){ state.filtroPrioDemanda = prio; renderPlanejamentoTab(); };

window.__addDemanda = async function(){
  var nota   = (document.getElementById('dm-nota').value || '').trim();
  var prazo  = document.getElementById('dm-prazo').value || '';
  var cidade = document.getElementById('dm-cidade').value || '';
  var prio   = document.getElementById('dm-prio') ? document.getElementById('dm-prio').value : 'Médio';
  if(!nota){ showToast('Descreva a demanda antes de adicionar.'); return; }
  var nova = {
    id: 'DM'+Date.now().toString(36).toUpperCase(),
    nota: nota, prazo: prazo, cidade: cidade,
    prioridade: prio,
    status: 'Pendente',
    criadoPor: state.perfil ? state.perfil.nome+' ('+state.perfil.papel+')' : '—',
    criadoEm: nowStr()
  };
  state.demandas.push(nova);
  await storageSet('demandas-lista', JSON.stringify(state.demandas), true);
  showToast((prio==='Alto'?'🔴':'prio'==='Médio'?'🟡':'🟢')+' Demanda '+prio+' adicionada.');

window.__concluirDemanda = async function(id, checked){
  var d = state.demandas.filter(function(x){ return x.id===id; })[0];
  if(!d) return;
  d.status = checked ? 'Concluída' : 'Pendente';
  d.concluidoEm = checked ? nowStr() : '';
  await storageSet('demandas-lista', JSON.stringify(state.demandas), true);
  showToast(checked ? '✅ Demanda concluída!' : 'Demanda reaberta.');
  renderPlanejamentoTab();
};

window.__excluirDemanda = async function(id){
  if(!confirm('Excluir esta demanda?')) return;
  state.demandas = state.demandas.filter(function(x){ return x.id!==id; });
  await storageSet('demandas-lista', JSON.stringify(state.demandas), true);
  showToast('Demanda excluída.');
  renderPlanejamentoTab();
};

window.__exportarDiarios = function(){
  var mes = state.mesSelecionado;
  var lista = state.diarios.filter(function(d){ return d.mes===mes; })
    .sort(function(a,b){ return b.dataISO.localeCompare(a.dataISO); });
  var rows = [['Data','Cidade','Polo','Categoria','Agendados','Realizados','Taxa (%)','Registrado por','Registrado em']];
  lista.forEach(function(d){
    var taxa = d.agendados>0 ? Math.round(d.realizados/d.agendados*100) : 0;
    rows.push([dataParaDisplay(d.dataISO),d.cidade,CIDADE_POLO[d.cidade].nome,catLabel(d.categoria),d.agendados,d.realizados,taxa+'%',d.registradoPor,d.registradoEm]);
  });
  downloadCSV(rows, 'diarios_'+mes+'.csv');
};

window.__planUpdate = async function(idx, field, value, isNumber){
  var row = state.planejamento[idx];
  row[field] = isNumber ? (parseInt(value,10)||0) : value;
  row.atualizadoPor = state.perfil.nome+' ('+state.perfil.papel+')';
  row.atualizadoEm = nowStr();
  if(field==='metaMensal' || field==='qtdRealizada'){
    var pct = row.metaMensal>0 ? Math.round((row.qtdRealizada/row.metaMensal)*100) : 0;
    var pctEl = document.getElementById('pct-'+idx);
    if(pctEl) pctEl.textContent = pct+'%';
  }
  await storageSet('planejamento-lista', JSON.stringify(state.planejamento), true);
  showToast('Planejamento de '+row.cidade+' atualizado.');
};

window.__exportarPlanejamento = function(){
  var rows = [['Cidade','Polo','Responsável','Papel','Meta mensal','Dias previstos','Dias c/ lançamento','Realizado (auto)','% atingido','Status','Observações']];
  state.planejamento.forEach(function(r){
    var real = realizadoMesAtual(r.cidade);
    var pct = r.metaMensal>0 ? Math.round(real/r.metaMensal*100) : 0;
    rows.push([r.cidade,r.poloNome,r.responsavel,r.papel,r.metaMensal,r.diasPrevistos,diasComLancamento(r.cidade),real,pct+'%',r.status,r.observacoes]);
  });
  downloadCSV(rows, 'planejamento.csv');
};

function renderAgendaTab(){
  var hoje = new Date().toISOString().slice(0,10);

  /* --- cabeçalho com seletor de visualização --- */
  var html = '<div class="card" style="margin-bottom:14px;">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;">'+
      '<div class="section-title" style="margin:0;">📅 Agenda de exames</div>'+
      '<div style="display:flex;gap:6px;">'+
        '<button class="btn '+(state.agendaView==='semana'?'btn-primary':'btn-ghost')+'" onclick="window.__agendaView(\'semana\')">Visão da semana</button>'+
        '<button class="btn '+(state.agendaView==='dia'?'btn-primary':'btn-ghost')+'" onclick="window.__agendaView(\'dia\')">Exames do dia</button>'+
      '</div>'+
    '</div>'+
    (state.agendaView==='dia' ?
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">'+
        '<label style="font-size:12.5px;font-weight:600;">Data:</label>'+
        '<input type="date" value="'+state.agendaData+'" onchange="window.__agendaSetData(this.value)" style="border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px;">'+
        '<button class="btn btn-ghost" onclick="window.__agendaSetData(new Date().toISOString().slice(0,10))">Hoje</button>'+
      '</div>' : '')+
  '</div>';

  if(state.agendaView==='dia'){
    /* --- VISÃO DIÁRIA --- */
    var data = state.agendaData;
    var examesDia = [];
    state.semanas.forEach(function(w){
      (w.entradas||[]).forEach(function(e){
        /* verifica se alguma categoria CDE tem data neste dia */
        var catsHoje = [];
        if(e.datasExatas){
          ['C','D','E'].forEach(function(k){
            if(e.datasExatas[k]===data && e.categorias.indexOf(k)>-1) catsHoje.push(k);
          });
        } else if(e.dataExata===data){
          catsHoje = e.categorias.filter(function(c){return c==='C'||c==='D'||c==='E';});
        }
        /* A e B: incluir se a data está dentro da semana */
        var abHoje = e.categorias.filter(function(c){return c==='A'||c==='B';});
        if(abHoje.length && w.inicio && w.fim){
          var di = data.split('-').reverse().join('/');
          if(data >= w.inicio.split('/').reverse().join('-') && data <= w.fim.split('/').reverse().join('-')) catsHoje = catsHoje.concat(abHoje);
        }
        if(catsHoje.length){
          examesDia.push({cidade:e.cidade, polo:CIDADE_POLO[e.cidade], cats:catsHoje, status:e.status, semana:w.label, entrada:e});
        }
      });
    });

    if(!examesDia.length){
      html += '<div class="empty card"><b>Nenhum exame registrado para '+dataParaDisplay(data)+'.</b>Verifique se a semana e as categorias foram cadastradas.</div>';
    } else {
      html += '<div class="section-title">📍 Exames em '+dataParaDisplay(data)+' ('+examesDia.length+' cidade(s))</div>';
      examesDia.forEach(function(ex){
        html += '<div style="background:#fff;border:1px solid var(--line);border-radius:11px;padding:10px 14px;margin-bottom:8px;">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;">'+
            '<div><b style="font-size:14px;">'+esc(ex.cidade)+'</b> <span class="polo-tag">'+esc(ex.polo.nome)+'</span>'+
            '<div class="cat-tags" style="margin-top:4px;">'+ex.cats.map(function(k){return '<span class="cat-tag">'+esc(catLabel(k))+'</span>';}).join('')+'</div></div>'+
            '<div style="text-align:right;">'+
              '<span class="pill '+(ex.status==='Realizado'?'green':ex.status==='Interrompido'?'red':'gray')+'">'+esc(ex.status)+'</span>'+
              '<div style="font-size:11px;color:var(--ink-soft);margin-top:3px;">'+esc(ex.semana)+'</div>'+
            '</div>'+
          '</div>'+
        '</div>';
      });
    }
    document.getElementById('tabContent').innerHTML = html;
    return;
  }

  /* --- VISÃO DA SEMANA (original + nova semana) --- */
  var htmlSemana = '<div class="card" style="margin-bottom:16px;">'+
    '<div class="section-title">Nova semana</div>'+
    '<div class="week-form">'+
      '<label>Identificação<input id="w-label" type="text" placeholder="Ex: Semana 1" value="'+esc(state.draftWeek.label)+'" oninput="window.__dw(\'label\',this.value)"></label>'+
      '<label>Início<input id="w-inicio" type="text" placeholder="29/06" value="'+esc(state.draftWeek.inicio)+'" oninput="window.__dw(\'inicio\',this.value)"></label>'+
      '<label>Fim<input id="w-fim" type="text" placeholder="03/07" value="'+esc(state.draftWeek.fim)+'" oninput="window.__dw(\'fim\',this.value)"></label>'+
      '<button class="btn btn-primary" onclick="window.__criarSemana()">+ Criar semana</button>'+
    '</div>'+
  '</div>';

  html += htmlSemana;

  if(!state.semanas.length){
    html += '<div class="empty card"><b>Nenhuma semana cadastrada ainda.</b>Crie a primeira semana acima para começar a agendar as cidades e categorias.</div>';
    document.getElementById('tabContent').innerHTML = html;
    return;
  }

  /* ordena semanas pela data de início real (mais recentes primeiro) */
  function parseDataSemana(s){
    if(!s) return 0;
    var p = s.split('/');
    var ano = new Date().getFullYear();
    if(p.length===3) return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0])).getTime();
    if(p.length===2) return new Date(ano, parseInt(p[1])-1, parseInt(p[0])).getTime();
    return 0;
  }
  var semanasOrd = state.semanas.slice().sort(function(a,b){
    var da = parseDataSemana(a.inicio);
    var db = parseDataSemana(b.inicio);
    if(da && db) return db - da; /* mais recente primeiro */
    return (b.criadoTs||0) - (a.criadoTs||0);
  });
  html += semanasOrd.map(function(w, idx){ return renderWeekCard(w, semanasOrd.length - idx); }).join('');
  document.getElementById('tabContent').innerHTML = html;
}

window.__draftEntryCat = function(wId, cat, checked){
  state.draftEntry[wId] = state.draftEntry[wId] || {cidade:'', cats:[], dataExata:'', datasExatas:{}};
  var cats = state.draftEntry[wId].cats;

window.__draftEntryData = function(wId, val){

  state.draftEntry[wId].dataExata = val;
};
window.__draftEntryDataCat = function(wId, cat, val){
  state.draftEntry[wId] = state.draftEntry[wId] || {cidade:'', cats:[], dataExata:'', datasExatas:{}};
  if(!state.draftEntry[wId].datasExatas) state.draftEntry[wId].datasExatas = {};
